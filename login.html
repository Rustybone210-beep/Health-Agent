<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>Health Agent -- Sign In</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-deep:#0f172a;
  --bg-mid:#1e293b;
  --glass:rgba(30,41,59,0.45);
  --glass-heavy:rgba(30,41,59,0.65);
  --glass-border:rgba(148,163,184,0.12);
  --glass-border-hover:rgba(148,163,184,0.24);
  --teal:#14b8a6;
  --teal-light:#2dd4bf;
  --teal-dark:#0d9488;
  --teal-glow:rgba(20,184,166,0.15);
  --teal-glow-strong:rgba(20,184,166,0.3);
  --teal-gradient:linear-gradient(135deg,#14b8a6,#0d9488);
  --red:#ef4444;
  --red-soft:rgba(239,68,68,0.12);
  --green:#22c55e;
  --green-soft:rgba(34,197,94,0.12);
  --text-primary:#f1f5f9;
  --text-secondary:#94a3b8;
  --text-tertiary:#64748b;
  --text-inverse:#0f172a;
  --radius-sm:16px;
  --radius-md:20px;
  --radius-lg:24px;
  --radius-xl:28px;
  --radius-pill:100px;
  --shadow-card:0 4px 24px rgba(0,0,0,0.25),0 1px 3px rgba(0,0,0,0.15);
  --shadow-float:0 8px 40px rgba(0,0,0,0.35),0 2px 8px rgba(0,0,0,0.2);
  --shadow-teal-glow:0 0 20px rgba(20,184,166,0.15);
  --ease-out:cubic-bezier(0.4,0,0.2,1);
  --ease-spring:cubic-bezier(0.32,0.72,0,1);
  --transition:0.25s cubic-bezier(0.4,0,0.2,1);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{
  height:100%;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:linear-gradient(145deg,var(--bg-deep) 0%,var(--bg-mid) 50%,var(--bg-deep) 100%);
  background-attachment:fixed;
  color:var(--text-primary);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  letter-spacing:-0.01em;
  overflow:hidden;
}
a{color:var(--teal-light);text-decoration:none}
input,textarea,button,select{font-family:inherit;font-size:inherit;color:inherit;border:none;outline:none;background:none}
button{cursor:pointer;-webkit-tap-highlight-color:transparent}
::selection{background:rgba(20,184,166,0.3)}

/* === LAYOUT === */
.login-page{
  display:flex;align-items:center;justify-content:center;
  min-height:100dvh;padding:20px;
  position:relative;overflow:hidden;
}

/* === AMBIENT GLOW EFFECTS === */
.ambient-glow{
  position:fixed;pointer-events:none;border-radius:50%;
  filter:blur(80px);opacity:0.4;
}
.glow-1{
  top:-15%;left:-10%;width:500px;height:500px;
  background:radial-gradient(circle,rgba(20,184,166,0.15),transparent 70%);
  animation:glowFloat1 8s ease-in-out infinite;
}
.glow-2{
  bottom:-20%;right:-10%;width:600px;height:600px;
  background:radial-gradient(circle,rgba(59,130,246,0.08),transparent 70%);
  animation:glowFloat2 10s ease-in-out infinite;
}
.glow-3{
  top:40%;left:50%;width:400px;height:400px;
  background:radial-gradient(circle,rgba(20,184,166,0.06),transparent 70%);
  animation:glowFloat3 12s ease-in-out infinite;
}
@keyframes glowFloat1{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,20px)}}
@keyframes glowFloat2{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,-30px)}}
@keyframes glowFloat3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.2)}}

/* === LOGIN CARD === */
.login-card{
  width:100%;max-width:420px;
  background:var(--glass-heavy);
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-xl);
  box-shadow:var(--shadow-float);
  padding:40px 32px 36px;
  position:relative;z-index:1;
  animation:cardIn 0.5s var(--ease-spring);
}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.login-card::before{
  content:'';position:absolute;
  top:-50%;left:-20%;width:140%;height:80%;
  background:radial-gradient(ellipse at center,var(--teal-glow) 0%,transparent 65%);
  pointer-events:none;opacity:0.5;
}

/* === LOGO === */
.login-logo{text-align:center;margin-bottom:32px;position:relative}
.login-logo-icon{
  width:64px;height:64px;border-radius:18px;
  background:var(--teal-gradient);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:28px;color:#fff;
  margin-bottom:16px;
  box-shadow:var(--shadow-teal-glow);
  animation:logoBreathe 3s ease-in-out infinite;
}
@keyframes logoBreathe{
  0%,100%{box-shadow:0 0 0 0 var(--teal-glow-strong),var(--shadow-teal-glow)}
  50%{box-shadow:0 0 24px 10px var(--teal-glow),0 0 40px 15px rgba(20,184,166,0.06)}
}
.login-logo h1{font-size:26px;font-weight:800;letter-spacing:-0.5px}
.login-logo p{font-size:14px;color:var(--text-secondary);margin-top:6px}

/* === TABS === */
.auth-tabs{
  display:flex;gap:4px;
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-pill);
  padding:4px;margin-bottom:28px;
}
.auth-tab{
  flex:1;padding:10px;border-radius:var(--radius-pill);
  text-align:center;font-size:13px;font-weight:600;
  color:var(--text-tertiary);
  transition:var(--transition);cursor:pointer;
}
.auth-tab.active{
  background:var(--teal-gradient);color:#fff;
  box-shadow:var(--shadow-teal-glow);
}
.auth-tab:hover:not(.active){color:var(--text-secondary)}

/* === FORM VIEWS === */
.auth-view{display:none;animation:viewIn 0.3s var(--ease-out)}
.auth-view.active{display:block}
@keyframes viewIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* === FORM ELEMENTS === */
.form-group{margin-bottom:18px}
.form-label{
  display:block;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.8px;
  color:var(--text-tertiary);margin-bottom:7px;
}
.input-wrap{
  position:relative;
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-sm);
  display:flex;align-items:center;
  transition:all var(--transition);
}
.input-wrap:focus-within{border-color:var(--teal);box-shadow:0 0 0 3px rgba(20,184,166,0.1)}
.input-wrap i{
  position:absolute;left:16px;
  font-size:15px;color:var(--text-tertiary);
  transition:color var(--transition);
}
.input-wrap:focus-within i{color:var(--teal)}
.input-wrap input{
  width:100%;padding:14px 16px 14px 46px;
  background:none;border:none;
  color:var(--text-primary);font-size:14px;
}
.input-wrap input::placeholder{color:var(--text-tertiary)}
.toggle-pw{
  position:absolute;right:14px;
  font-size:15px;color:var(--text-tertiary);
  cursor:pointer;transition:color var(--transition);
  padding:4px;
}
.toggle-pw:hover{color:var(--text-secondary)}

/* === BUTTONS === */
.btn-submit{
  width:100%;padding:15px;
  border-radius:var(--radius-pill);
  font-size:15px;font-weight:700;
  background:var(--teal-gradient);color:#fff;
  transition:var(--transition);
  box-shadow:var(--shadow-teal-glow);
  margin-top:4px;
  position:relative;overflow:hidden;
}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(20,184,166,0.3)}
.btn-submit:active{transform:scale(0.98)}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-submit .spinner{
  display:none;width:20px;height:20px;
  border:2.5px solid rgba(255,255,255,0.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin 0.6s linear infinite;
}
.btn-submit.loading .btn-text{display:none}
.btn-submit.loading .spinner{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

.btn-biometric{
  width:100%;padding:14px;
  border-radius:var(--radius-pill);
  font-size:14px;font-weight:600;
  background:var(--glass);
  border:1px solid var(--glass-border);
  color:var(--text-primary);
  transition:var(--transition);
  margin-top:12px;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.btn-biometric:hover{border-color:var(--glass-border-hover);transform:translateY(-1px)}
.btn-biometric i{font-size:18px;color:var(--teal)}

/* === DIVIDER === */
.divider{
  display:flex;align-items:center;gap:14px;
  margin:20px 0;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;
  background:var(--glass-border);
}
.divider span{font-size:12px;color:var(--text-tertiary);font-weight:500}

/* === LINKS === */
.auth-link{
  text-align:center;margin-top:16px;
  font-size:13px;color:var(--text-secondary);
}
.auth-link a{
  color:var(--teal-light);font-weight:600;
  cursor:pointer;transition:color var(--transition);
}
.auth-link a:hover{color:var(--teal)}

.forgot-link{
  display:block;text-align:right;
  font-size:12px;color:var(--teal-light);font-weight:500;
  margin-top:-10px;margin-bottom:18px;
  cursor:pointer;transition:color var(--transition);
}
.forgot-link:hover{color:var(--teal)}

/* === ALERTS === */
.alert{
  display:none;padding:12px 16px;
  border-radius:var(--radius-sm);
  font-size:13px;font-weight:500;
  margin-bottom:16px;
  align-items:center;gap:10px;
  animation:alertIn 0.25s var(--ease-out);
}
@keyframes alertIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.alert.show{display:flex}
.alert.error{background:var(--red-soft);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
.alert.success{background:var(--green-soft);color:var(--green);border:1px solid rgba(34,197,94,0.2)}
.alert i{font-size:15px;flex-shrink:0}

/* === TERMS === */
.terms{
  text-align:center;
  font-size:11px;color:var(--text-tertiary);
  margin-top:24px;line-height:1.5;
}
.terms a{color:var(--text-secondary)}

/* === PASSWORD STRENGTH === */
.pw-strength{margin-top:8px;margin-bottom:16px}
.pw-bar{
  height:3px;border-radius:2px;
  background:var(--glass);
  overflow:hidden;margin-bottom:6px;
}
.pw-fill{
  height:100%;border-radius:2px;
  transition:width 0.3s ease,background 0.3s ease;
  width:0%;
}
.pw-label{font-size:11px;font-weight:500;color:var(--text-tertiary)}

/* === RESPONSIVE === */
@media(max-width:480px){
  .login-card{padding:32px 24px 28px;border-radius:var(--radius-lg)}
  .login-logo h1{font-size:22px}
  .login-logo-icon{width:56px;height:56px;font-size:24px;border-radius:15px}
}
</style>
</head>
<body>

<!-- Ambient Glows -->
<div class="ambient-glow glow-1"></div>
<div class="ambient-glow glow-2"></div>
<div class="ambient-glow glow-3"></div>

<div class="login-page">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="login-logo-icon"><i class="fa-solid fa-heart-pulse"></i></div>
      <h1>Health Agent</h1>
      <p>AI-powered healthcare navigation</p>
    </div>

    <!-- Auth Tabs -->
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="showView('login')">Sign In</div>
      <div class="auth-tab" onclick="showView('register')">Create Account</div>
    </div>

    <!-- Alert -->
    <div class="alert" id="authAlert">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span id="alertText"></span>
    </div>

    <!-- ===== LOGIN VIEW ===== -->
    <div class="auth-view active" id="loginView">
      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="input-wrap">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
          <i class="fa-solid fa-eye toggle-pw" onclick="togglePassword('loginPassword', this)"></i>
        </div>
      </div>
      <a class="forgot-link" onclick="showView('forgot')">Forgot password?</a>
      <button class="btn-submit" id="loginBtn" onclick="doLogin()">
        <span class="btn-text">Sign In</span>
        <div class="spinner"></div>
      </button>
      <div id="biometricWrap" style="display:none">
        <div class="divider"><span>or</span></div>
        <button class="btn-biometric" onclick="doBiometric()">
          <i class="fa-solid fa-fingerprint"></i>
          Sign in with Biometrics
        </button>
      </div>
    </div>

    <!-- ===== REGISTER VIEW ===== -->
    <div class="auth-view" id="registerView">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <div class="input-wrap">
          <i class="fa-solid fa-user"></i>
          <input type="text" id="registerName" placeholder="Your full name" autocomplete="name">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="input-wrap">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="registerEmail" placeholder="you@example.com" autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="registerPassword" placeholder="Create a password" autocomplete="new-password" oninput="checkStrength(this.value)">
          <i class="fa-solid fa-eye toggle-pw" onclick="togglePassword('registerPassword', this)"></i>
        </div>
      </div>
      <div class="pw-strength">
        <div class="pw-bar"><div class="pw-fill" id="pwFill"></div></div>
        <div class="pw-label" id="pwLabel"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="registerConfirm" placeholder="Confirm password" autocomplete="new-password">
        </div>
      </div>
      <button class="btn-submit" id="registerBtn" onclick="doRegister()">
        <span class="btn-text">Create Account</span>
        <div class="spinner"></div>
      </button>
    </div>

    <!-- ===== FORGOT VIEW ===== -->
    <div class="auth-view" id="forgotView">
      <div style="text-align:center;margin-bottom:20px">
        <div style="width:48px;height:48px;border-radius:14px;background:var(--glass);border:1px solid var(--glass-border);display:inline-flex;align-items:center;justify-content:center;font-size:20px;color:var(--teal);margin-bottom:12px">
          <i class="fa-solid fa-key"></i>
        </div>
        <h3 style="font-size:18px;font-weight:700;margin-bottom:4px">Reset Password</h3>
        <p style="font-size:13px;color:var(--text-secondary)">Enter your email and we'll send a reset link</p>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="input-wrap">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="forgotEmail" placeholder="you@example.com" autocomplete="email">
        </div>
      </div>
      <button class="btn-submit" id="forgotBtn" onclick="doForgot()">
        <span class="btn-text">Send Reset Link</span>
        <div class="spinner"></div>
      </button>
      <div class="auth-link" style="margin-top:20px">
        <a onclick="showView('login')"><i class="fa-solid fa-arrow-left" style="margin-right:4px"></i> Back to Sign In</a>
      </div>
    </div>

    <!-- Terms -->
    <div class="terms">
      By continuing, you agree to Health Agent's<br>
      <a href="#">Terms of Service</a> & <a href="#">Privacy Policy</a>
    </div>
  </div>
</div>

<script>
// =============================================
// HEALTH AGENT -- LOGIN / REGISTER / FORGOT
// =============================================

function showView(view) {
  document.querySelectorAll('.auth-view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  hideAlert();

  if (view === 'login') {
    document.getElementById('loginView').classList.add('active');
    document.querySelectorAll('.auth-tab')[0].classList.add('active');
  } else if (view === 'register') {
    document.getElementById('registerView').classList.add('active');
    document.querySelectorAll('.auth-tab')[1].classList.add('active');
  } else if (view === 'forgot') {
    document.getElementById('forgotView').classList.add('active');
  }
}

function showAlert(msg, type) {
  const el = document.getElementById('authAlert');
  const text = document.getElementById('alertText');
  el.className = 'alert show ' + type;
  el.querySelector('i').className = type === 'error'
    ? 'fa-solid fa-circle-exclamation'
    : 'fa-solid fa-circle-check';
  text.textContent = msg;
}

function hideAlert() {
  document.getElementById('authAlert').className = 'alert';
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (loading) {
    btn.classList.add('loading');
    btn.disabled = true;
  } else {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function togglePassword(inputId, icon) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.replace('fa-eye', 'fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.replace('fa-eye-slash', 'fa-eye');
  }
}

function checkStrength(pw) {
  const fill = document.getElementById('pwFill');
  const label = document.getElementById('pwLabel');
  let score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;

  const levels = [
    { width: '0%', color: 'transparent', text: '' },
    { width: '20%', color: '#ef4444', text: 'Very weak' },
    { width: '40%', color: '#f59e0b', text: 'Weak' },
    { width: '60%', color: '#f59e0b', text: 'Fair' },
    { width: '80%', color: '#22c55e', text: 'Strong' },
    { width: '100%', color: '#14b8a6', text: 'Very strong' }
  ];
  const level = levels[score] || levels[0];
  fill.style.width = level.width;
  fill.style.background = level.color;
  label.textContent = level.text;
  label.style.color = level.color;
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  if (!email || !password) {
    return showAlert('Please enter email and password', 'error');
  }

  setLoading('loginBtn', true);
  hideAlert();

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (data.success || data.token) {
      const token = data.token;
      localStorage.setItem('ha_token', token);
      document.cookie = `ha_token=${token};path=/;max-age=${60*60*24*30};SameSite=Lax`;
      if (data.user) {
        localStorage.setItem('ha_user', JSON.stringify(data.user));
      }
      showAlert('Welcome back!', 'success');
      setTimeout(() => {
        window.location.href = data.redirect || '/';
      }, 500);
    } else {
      showAlert(data.error || data.message || 'Invalid email or password', 'error');
    }
  } catch (err) {
    showAlert('Connection error. Please try again.', 'error');
  }

  setLoading('loginBtn', false);
}

async function doRegister() {
  const name = document.getElementById('registerName').value.trim();
  const email = document.getElementById('registerEmail').value.trim();
  const password = document.getElementById('registerPassword').value;
  const confirm = document.getElementById('registerConfirm').value;

  if (!name || !email || !password) {
    return showAlert('Please fill in all fields', 'error');
  }
  if (password.length < 6) {
    return showAlert('Password must be at least 6 characters', 'error');
  }
  if (password !== confirm) {
    return showAlert('Passwords do not match', 'error');
  }

  setLoading('registerBtn', true);
  hideAlert();

  try {
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();

    if (data.success || data.token) {
      const token = data.token;
      localStorage.setItem('ha_token', token);
      document.cookie = `ha_token=${token};path=/;max-age=${60*60*24*30};SameSite=Lax`;
      if (data.user) {
        localStorage.setItem('ha_user', JSON.stringify(data.user));
      }
      showAlert('Account created!', 'success');
      setTimeout(() => {
        window.location.href = data.redirect || '/onboarding.html';
      }, 500);
    } else {
      showAlert(data.error || data.message || 'Registration failed', 'error');
    }
  } catch (err) {
    showAlert('Connection error. Please try again.', 'error');
  }

  setLoading('registerBtn', false);
}

async function doForgot() {
  const email = document.getElementById('forgotEmail').value.trim();

  if (!email) {
    return showAlert('Please enter your email', 'error');
  }

  setLoading('forgotBtn', true);
  hideAlert();

  try {
    const res = await fetch('/api/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();

    if (data.success) {
      showAlert('Reset link sent! Check your email.', 'success');
    } else {
      showAlert(data.error || data.message || 'Could not send reset link', 'error');
    }
  } catch (err) {
    showAlert('Connection error. Please try again.', 'error');
  }

  setLoading('forgotBtn', false);
}

async function doBiometric() {
  if (!window.PublicKeyCredential) {
    return showAlert('Biometrics not supported on this device', 'error');
  }

  try {
    const res = await fetch('/api/biometric/challenge');
    const challenge = await res.json();

    if (!challenge.success) {
      return showAlert('Biometric login not available', 'error');
    }

    const credential = await navigator.credentials.get({
      publicKey: {
        challenge: Uint8Array.from(atob(challenge.challenge), c => c.charCodeAt(0)),
        rpId: window.location.hostname,
        userVerification: 'preferred',
        timeout: 60000,
        allowCredentials: challenge.allowCredentials || []
      }
    });

    const verifyRes = await fetch('/api/biometric/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        id: credential.id,
        rawId: btoa(String.fromCharCode(...new Uint8Array(credential.rawId))),
        response: {
          authenticatorData: btoa(String.fromCharCode(...new Uint8Array(credential.response.authenticatorData))),
          clientDataJSON: btoa(String.fromCharCode(...new Uint8Array(credential.response.clientDataJSON))),
          signature: btoa(String.fromCharCode(...new Uint8Array(credential.response.signature)))
        }
      })
    });

    const data = await verifyRes.json();
    if (data.success || data.token) {
      localStorage.setItem('ha_token', data.token);
      document.cookie = `ha_token=${data.token};path=/;max-age=${60*60*24*30};SameSite=Lax`;
      showAlert('Authenticated!', 'success');
      setTimeout(() => { window.location.href = '/'; }, 500);
    } else {
      showAlert('Biometric verification failed', 'error');
    }
  } catch (err) {
    if (err.name !== 'NotAllowedError') {
      showAlert('Biometric error. Try password login.', 'error');
    }
  }
}

// Check for biometric support
async function checkBiometric() {
  if (window.PublicKeyCredential) {
    try {
      const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
      if (available) {
        document.getElementById('biometricWrap').style.display = 'block';
      }
    } catch (e) {}
  }
}

// Enter key support
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const active = document.querySelector('.auth-view.active');
    if (active.id === 'loginView') doLogin();
    else if (active.id === 'registerView') doRegister();
    else if (active.id === 'forgotView') doForgot();
  }
});

// If already logged in, redirect
(function() {
  const token = localStorage.getItem('ha_token');
  if (token) {
    fetch('/api/me', {
      headers: { 'Authorization': 'Bearer ' + token }
    }).then(r => r.json()).then(d => {
      if (d.success || d.user) window.location.href = '/';
    }).catch(() => {});
  }
  checkBiometric();
})();
</script>
