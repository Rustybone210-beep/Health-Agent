<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>Health Agent -- Reset Password</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-deep:#0f172a;
  --bg-mid:#1e293b;
  --glass:rgba(30,41,59,0.45);
  --glass-heavy:rgba(30,41,59,0.65);
  --glass-border:rgba(148,163,184,0.12);
  --glass-border-hover:rgba(148,163,184,0.24);
  --teal:#14b8a6;
  --teal-light:#2dd4bf;
  --teal-dark:#0d9488;
  --teal-glow:rgba(20,184,166,0.15);
  --teal-glow-strong:rgba(20,184,166,0.3);
  --teal-gradient:linear-gradient(135deg,#14b8a6,#0d9488);
  --red:#ef4444;
  --red-soft:rgba(239,68,68,0.12);
  --green:#22c55e;
  --green-soft:rgba(34,197,94,0.12);
  --text-primary:#f1f5f9;
  --text-secondary:#94a3b8;
  --text-tertiary:#64748b;
  --text-inverse:#0f172a;
  --radius-sm:16px;
  --radius-md:20px;
  --radius-lg:24px;
  --radius-xl:28px;
  --radius-pill:100px;
  --shadow-float:0 8px 40px rgba(0,0,0,0.35),0 2px 8px rgba(0,0,0,0.2);
  --shadow-teal-glow:0 0 20px rgba(20,184,166,0.15);
  --transition:0.25s cubic-bezier(0.4,0,0.2,1);
  --safe-top:env(safe-area-inset-top,0px);
}
html,body{
  height:100%;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:linear-gradient(145deg,var(--bg-deep) 0%,var(--bg-mid) 50%,var(--bg-deep) 100%);
  background-attachment:fixed;
  color:var(--text-primary);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  letter-spacing:-0.01em;
  overflow:hidden;
}
input,button{font-family:inherit;font-size:inherit;color:inherit;border:none;outline:none;background:none}
button{cursor:pointer;-webkit-tap-highlight-color:transparent}
::selection{background:rgba(20,184,166,0.3)}

/* Ambient */
.ambient{position:fixed;pointer-events:none;border-radius:50%;filter:blur(80px);opacity:0.35}
.amb-1{top:-12%;left:-8%;width:480px;height:480px;background:radial-gradient(circle,rgba(20,184,166,0.14),transparent 70%);animation:af1 8s ease-in-out infinite}
.amb-2{bottom:-18%;right:-8%;width:520px;height:520px;background:radial-gradient(circle,rgba(59,130,246,0.07),transparent 70%);animation:af2 10s ease-in-out infinite}
@keyframes af1{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,15px)}}
@keyframes af2{0%,100%{transform:translate(0,0)}50%{transform:translate(-15px,-20px)}}

/* Layout */
.reset-page{
  display:flex;align-items:center;justify-content:center;
  min-height:100dvh;padding:20px;
  position:relative;overflow:hidden;
}

/* Card */
.reset-card{
  width:100%;max-width:420px;
  background:var(--glass-heavy);
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-xl);
  box-shadow:var(--shadow-float);
  padding:40px 32px 36px;
  position:relative;z-index:1;
  animation:cardIn 0.5s cubic-bezier(0.32,0.72,0,1);
}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.reset-card::before{
  content:'';position:absolute;
  top:-50%;left:-20%;width:140%;height:80%;
  background:radial-gradient(ellipse,var(--teal-glow) 0%,transparent 65%);
  pointer-events:none;opacity:0.4;
}

/* Header */
.reset-header{text-align:center;margin-bottom:28px;position:relative}
.reset-icon{
  width:60px;height:60px;border-radius:16px;
  background:var(--teal-gradient);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:24px;color:#fff;
  margin-bottom:16px;
  box-shadow:var(--shadow-teal-glow);
}
.reset-header h1{font-size:22px;font-weight:800;letter-spacing:-0.4px;margin-bottom:6px}
.reset-header p{font-size:14px;color:var(--text-secondary);line-height:1.5}

/* Alert */
.alert{
  display:none;padding:12px 16px;
  border-radius:var(--radius-sm);
  font-size:13px;font-weight:500;
  margin-bottom:18px;
  align-items:center;gap:10px;
  animation:alertIn 0.25s cubic-bezier(0.4,0,0.2,1);
}
@keyframes alertIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.alert.show{display:flex}
.alert.error{background:var(--red-soft);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
.alert.success{background:var(--green-soft);color:var(--green);border:1px solid rgba(34,197,94,0.2)}
.alert i{font-size:15px;flex-shrink:0}

/* Form */
.form-group{margin-bottom:18px}
.form-label{
  display:block;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.8px;
  color:var(--text-tertiary);margin-bottom:7px;
}
.input-wrap{
  position:relative;
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-sm);
  display:flex;align-items:center;
  transition:all var(--transition);
}
.input-wrap:focus-within{border-color:var(--teal);box-shadow:0 0 0 3px rgba(20,184,166,0.1)}
.input-wrap i.field-icon{
  position:absolute;left:16px;
  font-size:15px;color:var(--text-tertiary);
  transition:color var(--transition);
}
.input-wrap:focus-within i.field-icon{color:var(--teal)}
.input-wrap input{
  width:100%;padding:14px 16px 14px 46px;
  background:none;border:none;
  color:var(--text-primary);font-size:14px;
}
.input-wrap input::placeholder{color:var(--text-tertiary)}
.toggle-pw{
  position:absolute;right:14px;
  font-size:15px;color:var(--text-tertiary);
  cursor:pointer;padding:4px;
  transition:color var(--transition);
}
.toggle-pw:hover{color:var(--text-secondary)}

/* Strength */
.pw-strength{margin-top:8px;margin-bottom:16px}
.pw-bar{height:3px;border-radius:2px;background:var(--glass);overflow:hidden;margin-bottom:6px}
.pw-fill{height:100%;border-radius:2px;transition:width 0.3s ease,background 0.3s ease;width:0%}
.pw-label{font-size:11px;font-weight:500;color:var(--text-tertiary)}

/* Button */
.btn-submit{
  width:100%;padding:15px;
  border-radius:var(--radius-pill);
  font-size:15px;font-weight:700;
  background:var(--teal-gradient);color:#fff;
  transition:var(--transition);
  box-shadow:var(--shadow-teal-glow);
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(20,184,166,0.3)}
.btn-submit:active{transform:scale(0.98)}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-submit .spinner{
  display:none;width:20px;height:20px;
  border:2.5px solid rgba(255,255,255,0.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin 0.6s linear infinite;
}
.btn-submit.loading .btn-text{display:none}
.btn-submit.loading .spinner{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* Back link */
.back-link{
  display:block;text-align:center;margin-top:20px;
  font-size:13px;color:var(--text-tertiary);
  transition:color var(--transition);
}
.back-link:hover{color:var(--teal-light)}
.back-link i{margin-right:4px}

/* Views */
.view{display:none;animation:viewIn 0.3s cubic-bezier(0.4,0,0.2,1)}
.view.active{display:block}
@keyframes viewIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Success state */
.success-view{text-align:center;padding:10px 0}
.success-icon{
  width:72px;height:72px;border-radius:50%;
  background:var(--teal-gradient);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:30px;color:#fff;
  margin-bottom:18px;
  box-shadow:var(--shadow-teal-glow);
  animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.success-view h2{font-size:20px;font-weight:800;margin-bottom:8px}
.success-view p{font-size:14px;color:var(--text-secondary);margin-bottom:24px;line-height:1.5}

/* Invalid token */
.invalid-view{text-align:center;padding:10px 0}
.invalid-icon{
  width:72px;height:72px;border-radius:50%;
  background:var(--red-soft);border:2px solid rgba(239,68,68,0.2);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:30px;color:var(--red);
  margin-bottom:18px;
}
.invalid-view h2{font-size:20px;font-weight:800;margin-bottom:8px}
.invalid-view p{font-size:14px;color:var(--text-secondary);margin-bottom:24px;line-height:1.5}

/* Responsive */
@media(max-width:480px){
  .reset-card{padding:32px 24px 28px;border-radius:var(--radius-lg)}
  .reset-header h1{font-size:20px}
}
</style>
</head>
<body>

<!-- Ambient -->
<div class="ambient amb-1"></div>
<div class="ambient amb-2"></div>

<div class="reset-page">
  <div class="reset-card">

    <!-- Header -->
    <div class="reset-header">
      <div class="reset-icon"><i class="fa-solid fa-key"></i></div>
      <h1>Reset Password</h1>
      <p id="headerDesc">Create a new password for your account.</p>
    </div>

    <!-- Alert -->
    <div class="alert" id="resetAlert">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span id="alertText"></span>
    </div>

    <!-- ===== RESET FORM VIEW ===== -->
    <div class="view active" id="formView">
      <div class="form-group">
        <label class="form-label">New Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock field-icon"></i>
          <input type="password" id="newPassword" placeholder="Enter new password" autocomplete="new-password" oninput="checkStrength(this.value)">
          <i class="fa-solid fa-eye toggle-pw" onclick="togglePw('newPassword', this)"></i>
        </div>
      </div>
      <div class="pw-strength">
        <div class="pw-bar"><div class="pw-fill" id="pwFill"></div></div>
        <div class="pw-label" id="pwLabel"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock field-icon"></i>
          <input type="password" id="confirmPassword" placeholder="Confirm new password" autocomplete="new-password">
          <i class="fa-solid fa-eye toggle-pw" onclick="togglePw('confirmPassword', this)"></i>
        </div>
      </div>
      <button class="btn-submit" id="resetBtn" onclick="doReset()">
        <span class="btn-text">Reset Password</span>
        <div class="spinner"></div>
      </button>
      <a class="back-link" href="/login.html"><i class="fa-solid fa-arrow-left"></i> Back to Sign In</a>
    </div>

    <!-- ===== SUCCESS VIEW ===== -->
    <div class="view" id="successView">
      <div class="success-view">
        <div class="success-icon"><i class="fa-solid fa-check"></i></div>
        <h2>Password Updated!</h2>
        <p>Your password has been reset successfully. You can now sign in with your new password.</p>
        <button class="btn-submit" onclick="window.location.href='/login.html'">
          <span class="btn-text">Go to Sign In</span>
        </button>
      </div>
    </div>

    <!-- ===== INVALID TOKEN VIEW ===== -->
    <div class="view" id="invalidView">
      <div class="invalid-view">
        <div class="invalid-icon"><i class="fa-solid fa-link-slash"></i></div>
        <h2>Link Expired</h2>
        <p>This reset link has expired or is invalid. Please request a new one.</p>
        <button class="btn-submit" onclick="window.location.href='/login.html'">
          <span class="btn-text">Back to Sign In</span>
        </button>
      </div>
    </div>

  </div>
</div>

<script>
// =============================================
// HEALTH AGENT -- RESET PASSWORD
// =============================================

let resetToken = '';

function showAlert(msg, type) {
  const el = document.getElementById('resetAlert');
  const text = document.getElementById('alertText');
  el.className = 'alert show ' + type;
  el.querySelector('i').className = type === 'error'
    ? 'fa-solid fa-circle-exclamation'
    : 'fa-solid fa-circle-check';
  text.textContent = msg;
}

function hideAlert() {
  document.getElementById('resetAlert').className = 'alert';
}

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function togglePw(inputId, icon) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.replace('fa-eye', 'fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.replace('fa-eye-slash', 'fa-eye');
  }
}

function checkStrength(pw) {
  const fill = document.getElementById('pwFill');
  const label = document.getElementById('pwLabel');
  let score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;

  const levels = [
    { width: '0%', color: 'transparent', text: '' },
    { width: '20%', color: '#ef4444', text: 'Very weak' },
    { width: '40%', color: '#f59e0b', text: 'Weak' },
    { width: '60%', color: '#f59e0b', text: 'Fair' },
    { width: '80%', color: '#22c55e', text: 'Strong' },
    { width: '100%', color: '#14b8a6', text: 'Very strong' }
  ];
  const level = levels[score] || levels[0];
  fill.style.width = level.width;
  fill.style.background = level.color;
  label.textContent = level.text;
  label.style.color = level.color;
}

async function doReset() {
  const pw = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;

  if (!pw) return showAlert('Please enter a new password', 'error');
  if (pw.length < 6) return showAlert('Password must be at least 6 characters', 'error');
  if (pw !== confirm) return showAlert('Passwords do not match', 'error');

  const btn = document.getElementById('resetBtn');
  btn.classList.add('loading');
  btn.disabled = true;
  hideAlert();

  try {
    const res = await fetch('/api/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: resetToken, password: pw })
    });
    const data = await res.json();

    if (data.success) {
      showView('successView');
    } else {
      if (data.error && (data.error.includes('expired') || data.error.includes('invalid') || data.error.includes('token'))) {
        showView('invalidView');
      } else {
        showAlert(data.error || data.message || 'Reset failed. Please try again.', 'error');
      }
    }
  } catch (err) {
    showAlert('Connection error. Please try again.', 'error');
  }

  btn.classList.remove('loading');
  btn.disabled = false;
}

// Enter key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('formView').classList.contains('active')) {
    doReset();
  }
});

// Extract token from URL
(function() {
  const params = new URLSearchParams(window.location.search);
  resetToken = params.get('token') || '';

  if (!resetToken) {
    // No token - show invalid view
    showView('invalidView');
    document.getElementById('headerDesc').textContent = 'This link appears to be invalid.';
    return;
  }

  // Optionally verify token is still valid
  fetch('/api/verify-reset-token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: resetToken })
  }).then(r => r.json()).then(data => {
    if (!data.success && !data.valid) {
      showView('invalidView');
    }
  }).catch(() => {
    // If endpoint doesn't exist, just show the form - it'll validate on submit
  });
})();
</script>
</body>
</html>
