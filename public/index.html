<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Health Agent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#050505;color:#f5f5f5;height:100vh;display:flex;flex-direction:column}
.header{padding:1rem 1.5rem;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;gap:.5rem}
.logo{font-weight:800;font-size:1.2rem;color:#2dd4bf}
.status{width:8px;height:8px;background:#4ade80;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.chat{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem}
.msg{max-width:80%;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end}
.msg.agent{align-self:flex-start}
.sender{font-size:.65rem;color:#737373;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.3rem;font-weight:600}
.bubble{padding:.8rem 1.1rem;border-radius:12px;font-size:.9rem;line-height:1.6}
.agent .bubble{background:#111;border:1px solid #1e1e1e;color:#e5e5e5}
.user .bubble{background:#2dd4bf;color:#050505;font-weight:500}
.input-area{padding:1rem 1.5rem;border-top:1px solid #1e1e1e;background:#0c0c0c}
.input-wrap{display:flex;gap:.8rem;background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:.5rem .8rem}
.input-wrap:focus-within{border-color:#2dd4bf}
input{flex:1;background:none;border:none;color:#f5f5f5;font-size:.9rem;outline:none;font-family:inherit}
input::placeholder{color:#404040}
button{width:40px;height:40px;border-radius:50%;background:#2dd4bf;border:none;color:#050505;font-size:1.1rem;cursor:pointer}
button:hover{opacity:.9}
.typing{display:flex;gap:4px;padding:.5rem 0}
.typing span{width:6px;height:6px;background:#2dd4bf;border-radius:50%;animation:bounce 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-8px);opacity:1}}
.hint{text-align:center;font-size:.6rem;color:#404040;margin-top:.4rem}
</style>
</head>
<body>
<div class="header"><span class="status"></span><span class="logo">+ Health Agent</span></div>
<div class="chat" id="chat">
  <div class="msg agent"><div class="sender">Health Agent</div><div class="bubble">Hey J. I'm your Health Agent. I can schedule appointments, fight insurance denials, manage prescriptions, and find doctors worldwide. What do you need help with?</div></div>
</div>
<div class="input-area">
  <div class="input-wrap">
    <input id="input" placeholder="Tell me what you need..." onkeydown="if(event.key==='Enter')send()">
    <button onclick="send()">→</button>
  </div>
  <div class="hint">Try: "Schedule mom's CT scan" or "My insurance denied the MRI claim"</div>
</div>
<script>
const chat=document.getElementById('chat'),input=document.getElementById('input');
let history=[];

function addMsg(role,text){
  const d=document.createElement('div');
  d.className='msg '+role;
  d.innerHTML='<div class="sender">'+(role==='agent'?'Health Agent':'You')+'</div><div class="bubble">'+text.replace(/\n/g,'<br>')+'</div>';
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function showTyping(){
  const d=document.createElement('div');
  d.className='msg agent';d.id='typing';
  d.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}

function hideTyping(){const t=document.getElementById('typing');if(t)t.remove()}

async function send(){
  const text=input.value.trim();
  if(!text)return;
  input.value='';
  addMsg('user',text);
  history.push({role:'user',content:text});
  showTyping();
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,history:history.slice(0,-1)})});
    const data=await res.json();
    hideTyping();
    if(data.reply){
      addMsg('agent',data.reply);
      history.push({role:'assistant',content:data.reply});
    }else{
      addMsg('agent','Something went wrong. Try again.');
    }
  }catch(e){hideTyping();addMsg('agent','Connection error: '+e.message);}
}
</script>
</body>
</html>
