<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="color-scheme" content="dark light">
<title>Health Agent — Sign In</title>
<meta name="theme-color" content="#0f172a">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f172a;--bg2:#1e293b;--surface:rgba(30,41,59,0.85);--glass:rgba(15,23,42,0.88);--glass-border:rgba(45,212,191,0.12);--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--accent:#2dd4bf;--danger:#f87171;--sans:'Inter',-apple-system,sans-serif}
html,body{min-height:100dvh;font-family:var(--sans);background:linear-gradient(160deg,var(--bg),var(--bg2));color:var(--text);-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center}
.wrap{width:100%;max-width:420px;padding:20px}
.logo{text-align:center;margin-bottom:36px}
.logo-icon{width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,#2dd4bf,#06b6d4);display:inline-flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#0f172a;box-shadow:0 8px 24px rgba(45,212,191,0.3);margin-bottom:16px}
.logo-title{font-size:28px;font-weight:700;letter-spacing:-0.03em}
.logo-sub{font-size:14px;color:var(--text2);margin-top:4px}
.card{background:var(--glass);border:1px solid var(--glass-border);border-radius:24px;padding:28px 24px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:rgba(51,65,85,0.4);border-radius:14px;padding:4px}
.tab{flex:1;padding:10px;border-radius:10px;border:none;background:transparent;color:var(--text3);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all 0.2s}
.tab.active{background:rgba(45,212,191,0.15);color:var(--accent)}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3);margin-bottom:6px}
.field input{width:100%;background:rgba(51,65,85,0.4);border:1px solid var(--glass-border);border-radius:14px;padding:14px 16px;font-size:16px;color:var(--text);outline:none;font-family:var(--sans);-webkit-appearance:none}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,212,191,0.12)}
.field input::placeholder{color:var(--text3)}
.row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.remember{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.remember input{width:16px;height:16px;accent-color:var(--accent)}
.forgot{font-size:13px;color:var(--accent);cursor:pointer;font-weight:500;background:none;border:none;font-family:var(--sans)}
.btn{width:100%;padding:16px;border-radius:14px;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all 0.15s;box-shadow:0 4px 16px rgba(45,212,191,0.25)}
.btn:active{transform:scale(0.98)}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,#2dd4bf,#06b6d4);color:#0f172a}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--glass-border)}
.btn-bio{width:100%;padding:14px;border-radius:14px;border:1px solid var(--glass-border);background:rgba(51,65,85,0.3);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--sans);display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.15s}
.btn-bio:hover{border-color:var(--accent);background:rgba(45,212,191,0.06)}
.btn-bio:active{transform:scale(0.98)}
.msg{font-size:13px;margin-top:10px;display:none;padding:10px 14px;border-radius:12px}
.msg.show{display:block}
.msg.err{color:var(--danger);background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.15)}
.msg.ok{color:var(--accent);background:rgba(45,212,191,0.08);border:1px solid rgba(45,212,191,0.15)}
.switch{text-align:center;margin-top:20px;font-size:13px;color:var(--text3)}
.switch a{color:var(--accent);cursor:pointer;font-weight:600}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">HA</div>
    <div class="logo-title">Health Agent</div>
    <div class="logo-sub">Your AI healthcare navigator</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="showPanel('login')">Sign In</button>
      <button class="tab" id="tabRegister" onclick="showPanel('register')">Create Account</button>
    </div>

    <!-- LOGIN -->
    <div id="panelLogin">
      <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="you@email.com" autocomplete="email"></div>
      <div class="field"><label>Password</label><input type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password"></div>
      <div class="row">
        <label class="remember"><input type="checkbox" id="rememberMe" checked> Remember me</label>
        <button class="forgot" onclick="showPanel('forgot')">Forgot password?</button>
      </div>
      <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Sign In</button>
      <div class="divider">or</div>
      <button class="btn-bio" onclick="doBiometric()"><span style="font-size:22px">&#128100;</span> Sign in with Face ID / Touch ID</button>
      <div class="msg err" id="loginErr"></div>
    </div>

    <!-- REGISTER -->
    <div id="panelRegister" class="hidden">
      <div class="field"><label>Full Name</label><input type="text" id="regName" placeholder="J Fields" autocomplete="name"></div>
      <div class="field"><label>Email</label><input type="email" id="regEmail" placeholder="you@email.com" autocomplete="email"></div>
      <div class="field"><label>Password</label><input type="password" id="regPassword" placeholder="At least 8 characters" autocomplete="new-password"></div>
      <div class="field"><label>Confirm Password</label><input type="password" id="regConfirm" placeholder="Confirm password"></div>
      <button class="btn btn-primary" onclick="doRegister()">Create Account</button>
      <div class="msg err" id="regErr"></div>
      <div class="msg ok" id="regOk"></div>
    </div>

    <!-- FORGOT PASSWORD -->
    <div id="panelForgot" class="hidden">
      <p style="font-size:14px;color:var(--text2);margin-bottom:16px">Enter your email and we'll send a reset link.</p>
      <div class="field"><label>Email</label><input type="email" id="forgotEmail" placeholder="you@email.com"></div>
      <button class="btn btn-primary" onclick="doForgot()">Send Reset Link</button>
      <div class="msg err" id="forgotErr"></div>
      <div class="msg ok" id="forgotOk"></div>
      <p style="text-align:center;margin-top:16px;font-size:13px"><a style="color:var(--accent);cursor:pointer" onclick="showPanel('login')">Back to Sign In</a></p>
    </div>
  </div>

  <div class="switch" id="switchText">Don't have an account? <a onclick="showPanel('register')">Create one</a></div>
</div>

<script>
function showPanel(panel) {
  document.getElementById('panelLogin').classList.toggle('hidden', panel !== 'login');
  document.getElementById('panelRegister').classList.toggle('hidden', panel !== 'register');
  document.getElementById('panelForgot').classList.toggle('hidden', panel !== 'forgot');
  document.getElementById('tabLogin').classList.toggle('active', panel === 'login');
  document.getElementById('tabRegister').classList.toggle('active', panel === 'register');
  if (panel === 'login') document.getElementById('switchText').innerHTML = 'Don\'t have an account? <a onclick="showPanel(\'register\')">Create one</a>';
  else if (panel === 'register') document.getElementById('switchText').innerHTML = 'Already have an account? <a onclick="showPanel(\'login\')">Sign in</a>';
  else document.getElementById('switchText').innerHTML = '';
  hideAll();
}

function showMsg(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.classList.add('show'); }
function hideAll() { document.querySelectorAll('.msg').forEach(el => el.classList.remove('show')); }

function saveToken(token, user) {
  localStorage.setItem('ha_token', token);
  localStorage.setItem('ha_user', JSON.stringify(user));
  document.cookie = 'ha_token=' + token + ';path=/;max-age=' + (30*24*60*60) + ';SameSite=Lax';
}

async function doLogin() {
  hideAll();
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPassword').value;
  if (!email || !pw) { showMsg('loginErr', 'Enter email and password'); return; }
  document.getElementById('loginBtn').disabled = true;
  document.getElementById('loginBtn').textContent = 'Signing in...';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pw })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    saveToken(data.token, data.user);
    window.location.href = '/';
  } catch (e) {
    showMsg('loginErr', e.message);
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('loginBtn').textContent = 'Sign In';
  }
}

async function doRegister() {
  hideAll();
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pw = document.getElementById('regPassword').value;
  const confirm = document.getElementById('regConfirm').value;
  if (!name || !email || !pw) { showMsg('regErr', 'All fields required'); return; }
  if (pw.length < 8) { showMsg('regErr', 'Password must be at least 8 characters'); return; }
  if (pw !== confirm) { showMsg('regErr', 'Passwords do not match'); return; }
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password: pw })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Registration failed');
    showMsg('regOk', 'Account created! Signing you in...');
    // Send welcome email
    try {
      await fetch('/api/auth/welcome-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, name })
      });
    } catch(emailErr) {}
    // Auto login
    const loginRes = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pw })
    });
    const loginData = await loginRes.json();
    if (loginRes.ok) {
      saveToken(loginData.token, loginData.user);
      setTimeout(function() { window.location.href = '/'; }, 800);
    }
  } catch (e) {
    showMsg('regErr', e.message);
  }
}

async function doForgot() {
  hideAll();
  const email = document.getElementById('forgotEmail').value.trim();
  if (!email) { showMsg('forgotErr', 'Enter your email'); return; }
  try {
    const res = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    let msg = 'If that email exists, a reset link has been sent. Check your inbox.';
    if (data.resetUrl) msg += ' Dev link: ' + data.resetUrl;
    showMsg('forgotOk', msg);
  } catch (e) {
    showMsg('forgotErr', 'Something went wrong. Try again.');
  }
}

async function doBiometric() {
  hideAll();
  if (!window.PublicKeyCredential) { showMsg('loginErr', 'Biometric login not supported on this browser.'); return; }
  try {
    const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    if (!available) { showMsg('loginErr', 'Face ID / Touch ID not available on this device.'); return; }
    const chRes = await fetch('/api/auth/biometric-challenge');
    const chData = await chRes.json();
    const credential = await navigator.credentials.get({
      publicKey: {
        challenge: Uint8Array.from(atob(chData.challenge), c => c.charCodeAt(0)),
        rpId: window.location.hostname,
        userVerification: 'required',
        timeout: 60000
      }
    });
    const credentialId = btoa(String.fromCharCode(...new Uint8Array(credential.rawId)));
    const res = await fetch('/api/auth/biometric-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ credentialId })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Biometric login failed');
    saveToken(data.token, data.user);
    window.location.href = '/';
  } catch (e) {
    if (e.name === 'NotAllowedError') showMsg('loginErr', 'Authentication cancelled. Try again or use password.');
    else showMsg('loginErr', e.message || 'Biometric login failed.');
  }
}

// Auto-redirect if already logged in
const token = localStorage.getItem('ha_token');
if (token) {
  fetch('/api/auth/verify', { headers: { 'Authorization': 'Bearer ' + token } })
    .then(r => { if (r.ok) window.location.href = '/'; });
}

// Enter to submit
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if (!document.getElementById('panelLogin').classList.contains('hidden')) doLogin();
    else if (!document.getElementById('panelRegister').classList.contains('hidden')) doRegister();
    else if (!document.getElementById('panelForgot').classList.contains('hidden')) doForgot();
  }
});
</script>
</body>
</html>
