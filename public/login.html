<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Health Agent — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:linear-gradient(145deg,#0a1628,#1e293b,#0a1628);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:#f1f5f9}
.card{width:100%;max-width:400px;background:rgba(30,41,59,0.7);backdrop-filter:blur(24px);border:1px solid rgba(148,163,184,0.12);border-radius:28px;padding:36px 32px;box-shadow:0 24px 80px rgba(0,0,0,0.4)}
.logo{text-align:center;margin-bottom:28px}
.logo-icon{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#0d9488,#14b8a6,#2dd4bf);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 0 0 8px rgba(20,184,166,0.1)}
.logo-icon i{font-size:24px;color:white}
.logo h1{font-size:22px;font-weight:800;color:#2dd4bf;letter-spacing:-0.5px}
.logo h1 span{color:#f1f5f9}
.logo p{font-size:12px;color:#94a3b8;margin-top:4px}
.tabs{display:flex;background:rgba(15,23,42,0.5);border-radius:12px;padding:4px;margin-bottom:24px;gap:4px}
.tab{flex:1;padding:9px;border-radius:9px;font-size:12px;font-weight:600;color:#64748b;cursor:pointer;text-align:center;transition:all .2s;border:none;background:none}
.tab.active{background:rgba(20,184,166,0.15);color:#2dd4bf;border:1px solid rgba(20,184,166,0.25)}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
.form-input{width:100%;background:rgba(15,23,42,0.6);border:1px solid rgba(148,163,184,0.15);border-radius:12px;padding:12px 14px;font-size:14px;color:#f1f5f9;outline:none;font-family:'Inter',sans-serif;transition:border .2s}
.form-input:focus{border-color:rgba(20,184,166,0.5)}
.form-input::placeholder{color:#475569}
.btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,#0d9488,#14b8a6);border:none;border-radius:12px;font-size:14px;font-weight:700;color:white;cursor:pointer;transition:all .2s;margin-top:6px;letter-spacing:.2px}
.btn-primary:hover{background:linear-gradient(135deg,#14b8a6,#2dd4bf);transform:translateY(-1px);box-shadow:0 8px 24px rgba(20,184,166,0.3)}
.btn-primary:active{transform:translateY(0)}
.btn-secondary{width:100%;padding:12px;background:rgba(148,163,184,0.08);border:1px solid rgba(148,163,184,0.15);border-radius:12px;font-size:13px;font-weight:600;color:#94a3b8;cursor:pointer;transition:all .2s;margin-top:8px}
.btn-secondary:hover{background:rgba(148,163,184,0.14);color:#f1f5f9}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:#475569;font-size:11px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(148,163,184,0.1)}
.error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:10px 14px;font-size:12px;color:#fca5a5;margin-bottom:14px;display:none}
.error-msg.show{display:block}
.success-msg{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);border-radius:10px;padding:10px 14px;font-size:12px;color:#86efac;margin-bottom:14px;display:none}
.success-msg.show{display:block}
.forgot-link{text-align:right;margin-bottom:14px}
.forgot-link a{font-size:11px;color:#2dd4bf;text-decoration:none;cursor:pointer}
.forgot-link a:hover{text-decoration:underline}
.features{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:24px;padding-top:20px;border-top:1px solid rgba(148,163,184,0.08)}
.feature{display:flex;align-items:center;gap:7px;font-size:11px;color:#64748b}
.feature i{color:#14b8a6;font-size:11px;width:14px}
.loading{display:none;align-items:center;justify-content:center;gap:8px;font-size:13px;color:#94a3b8;padding:10px}
.loading.show{display:flex}
.spinner{width:16px;height:16px;border:2px solid rgba(148,163,184,0.2);border-top-color:#14b8a6;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#forgotPanel{display:none}
#forgotPanel.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon"><i class="fa-solid fa-heart-pulse"></i></div>
    <h1>Health<span>Agent</span></h1>
    <p>AI-powered healthcare navigation</p>
  </div>

  <!-- Main panels -->
  <div id="authPanel">
    <div class="tabs">
      <button class="tab active" id="tabSignIn" onclick="showTab('signin')">Sign In</button>
      <button class="tab" id="tabCreate" onclick="showTab('create')">Create Account</button>
    </div>

    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>
    <div class="loading" id="loadingIndicator"><div class="spinner"></div>Please wait…</div>

    <!-- Sign In -->
    <div id="signinForm">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="siEmail" class="form-input" type="email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative">
          <input id="siPassword" class="form-input" type="password" placeholder="••••••••" autocomplete="current-password" style="padding-right:44px">
          <button type="button" onclick="togglePw('siPassword',this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#64748b;cursor:pointer;font-size:14px;padding:4px" title="Show password"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>
      <div class="forgot-link"><a onclick="showForgot()">Forgot password?</a></div>
      <button class="btn-primary" onclick="doSignIn()"><i class="fa-solid fa-right-to-bracket" style="margin-right:8px"></i>Sign In</button>
    </div>

    <!-- Create Account -->
    <div id="createForm" style="display:none">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input id="regName" class="form-input" type="text" placeholder="Your full name" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="regEmail" class="form-input" type="email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative">
          <input id="regPassword" class="form-input" type="password" placeholder="Min 8 characters" autocomplete="new-password" style="padding-right:44px">
          <button type="button" onclick="togglePw('regPassword',this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#64748b;cursor:pointer;font-size:14px;padding:4px" title="Show password"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>
      <div style="margin:12px 0;padding:12px;background:rgba(20,184,166,0.06);border:1px solid rgba(20,184,166,0.15);border-radius:10px">
        <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:12px;color:#94a3b8;line-height:1.5">
          <input type="checkbox" id="consentCheck" style="margin-top:3px;flex-shrink:0;accent-color:#14b8a6">
          <span>I agree to the <a href="/terms" target="_blank" style="color:#2dd4bf">Terms of Service</a> and <a href="/privacy" target="_blank" style="color:#2dd4bf">Privacy Policy</a>. I understand Health Agent uses AI to assist with healthcare navigation and is <strong style="color:#f1f5f9">not a substitute for professional medical advice</strong>. Health data is processed with de-identification protections under <a href="/privacy#hipaa" target="_blank" style="color:#2dd4bf">HIPAA safeguards</a>.</span>
        </label>
      </div>
      <button class="btn-primary" onclick="doRegister()"><i class="fa-solid fa-user-plus" style="margin-right:8px"></i>Create Account</button>
    </div>
  </div>

  <!-- Forgot Password Panel -->
  <div id="forgotPanel">
    <div style="margin-bottom:16px">
      <div style="font-size:15px;font-weight:700;color:#f1f5f9;margin-bottom:6px">Reset Password</div>
      <div style="font-size:12px;color:#94a3b8">Enter your email and we'll send a reset link.</div>
    </div>
    <div id="forgotError" class="error-msg"></div>
    <div id="forgotSuccess" class="success-msg"></div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input id="forgotEmail" class="form-input" type="email" placeholder="your@email.com">
    </div>
    <button class="btn-primary" onclick="doForgot()"><i class="fa-solid fa-envelope" style="margin-right:8px"></i>Send Reset Link</button>
    <button class="btn-secondary" onclick="showAuth()">Back to Sign In</button>
  </div>

  <div class="features">
    <div class="feature"><i class="fa-solid fa-lock"></i>HIPAA-compliant</div>
    <div class="feature"><i class="fa-solid fa-brain"></i>AI-powered</div>
    <div class="feature"><i class="fa-solid fa-camera"></i>Scan documents</div>
    <div class="feature"><i class="fa-solid fa-bell"></i>Smart alerts</div>
  </div>
</div>

<script>
function showTab(tab) {
  document.getElementById('signinForm').style.display = tab==='signin'?'block':'none';
  document.getElementById('createForm').style.display = tab==='create'?'block':'none';
  document.getElementById('tabSignIn').classList.toggle('active', tab==='signin');
  document.getElementById('tabCreate').classList.toggle('active', tab==='create');
  clearMessages();
}
function showForgot() {
  document.getElementById('authPanel').style.display='none';
  document.getElementById('forgotPanel').classList.add('show');
}
function showAuth() {
  document.getElementById('authPanel').style.display='block';
  document.getElementById('forgotPanel').classList.remove('show');
}
function clearMessages() {
  ['errorMsg','successMsg','forgotError','forgotSuccess'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){el.classList.remove('show');el.textContent=''}
  });
}
function showError(msg, id='errorMsg') {
  const el=document.getElementById(id);
  if(el){el.textContent=msg;el.classList.add('show')}
}
function showSuccess(msg, id='successMsg') {
  const el=document.getElementById(id);
  if(el){el.textContent=msg;el.classList.add('show')}
}
function setLoading(show) {
  document.getElementById('loadingIndicator').classList.toggle('show',show);
}

async function doSignIn() {
  clearMessages();
  const email=document.getElementById('siEmail').value.trim();
  const password=document.getElementById('siPassword').value;
  if(!email||!password){showError('Email and password required.');return}
  setLoading(true);
  try {
    const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const data=await res.json();
    if(!res.ok||data.error){showError(data.error||'Sign in failed.');return}
    localStorage.setItem('ha_token',data.token);
    localStorage.setItem('ha_user',JSON.stringify(data.user||{}));
    document.cookie='ha_token='+data.token+';path=/;max-age=86400';
    window.location.href='/';
  } catch(e){showError('Connection error. Please try again.')}
  finally{setLoading(false)}
}

async function doRegister() {
  clearMessages();
  const name=document.getElementById('regName').value.trim();
  const email=document.getElementById('regEmail').value.trim();
  const password=document.getElementById('regPassword').value;
  if(!email||!password){showError('Email and password required.');return}
  if(password.length<8){showError('Password must be at least 8 characters.');return}
  if(!document.getElementById('consentCheck').checked){showError('Please agree to the Terms of Service and Privacy Policy.');return}
  setLoading(true);
  try {
    const res=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password})});
    const data=await res.json();
    if(!res.ok||data.error){showError(data.error||'Registration failed.');return}
    showSuccess('Account created! Signing you in…');
    setTimeout(async()=>{
      const r2=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      const d2=await r2.json();
      if(d2.token){localStorage.setItem('ha_token',d2.token);document.cookie='ha_token='+d2.token+';path=/;max-age=86400';window.location.href='/'}
    },1000);
  } catch(e){showError('Connection error. Please try again.')}
  finally{setLoading(false)}
}

async function doForgot() {
  const email=document.getElementById('forgotEmail').value.trim();
  if(!email){showError('Email required.','forgotError');return}
  try {
    const res=await fetch('/api/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
    const data=await res.json();
    showSuccess(data.message||'Reset link sent if that email exists.','forgotSuccess');
  } catch(e){showError('Connection error.','forgotError')}
}

// Enter key support
function togglePw(id, btn) {
  const input = document.getElementById(id);
  const icon = btn.querySelector('i');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'fa-solid fa-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'fa-solid fa-eye';
  }
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(document.getElementById('forgotPanel').classList.contains('show'))doForgot();
    else if(document.getElementById('createForm').style.display!=='none')doRegister();
    else doSignIn();
  }
});
</script>
</body>
</html>
