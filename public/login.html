<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="color-scheme" content="dark light">
<title>Health Agent — Sign In</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="theme-color" content="#0f172a">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f172a;--bg2:#1e293b;--surface:rgba(30,41,59,0.85);--glass:rgba(15,23,42,0.88);--glass-border:rgba(45,212,191,0.12);--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--accent:#2dd4bf;--danger:#f87171;--sans:'Inter',-apple-system,sans-serif;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,20px)}
html,body{min-height:100dvh;font-family:var(--sans);background:linear-gradient(160deg,var(--bg),var(--bg2));color:var(--text);-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center}
.login-wrap{width:100%;max-width:420px;padding:20px}
.login-logo{text-align:center;margin-bottom:36px}
.logo-icon{width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,#2dd4bf,#06b6d4);display:inline-flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#0f172a;box-shadow:0 8px 24px rgba(45,212,191,0.3);margin-bottom:16px}
.logo-title{font-size:28px;font-weight:700;letter-spacing:-0.03em}
.logo-sub{font-size:14px;color:var(--text2);margin-top:4px}
.login-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:24px;padding:28px 24px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.tab-row{display:flex;gap:4px;margin-bottom:24px;background:rgba(51,65,85,0.4);border-radius:14px;padding:4px}
.tab{flex:1;padding:10px;border-radius:10px;border:none;background:transparent;color:var(--text3);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all 0.2s}
.tab.active{background:rgba(45,212,191,0.15);color:var(--accent)}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3);margin-bottom:6px}
.field input{width:100%;background:rgba(51,65,85,0.4);border:1px solid var(--glass-border);border-radius:14px;padding:14px 16px;font-size:16px;color:var(--text);outline:none;font-family:var(--sans);-webkit-appearance:none}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,212,191,0.12)}
.field input::placeholder{color:var(--text3)}
.btn-primary{width:100%;padding:16px;border-radius:14px;border:none;background:linear-gradient(135deg,#2dd4bf,#06b6d4);color:#0f172a;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all 0.15s;box-shadow:0 4px 16px rgba(45,212,191,0.25)}
.btn-primary:active{transform:scale(0.98)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--glass-border)}
.btn-bio{width:100%;padding:14px;border-radius:14px;border:1px solid var(--glass-border);background:rgba(51,65,85,0.3);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--sans);display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.15s;backdrop-filter:blur(8px)}
.btn-bio:hover{border-color:var(--accent);background:rgba(45,212,191,0.06)}
.btn-bio:active{transform:scale(0.98)}
.error-msg{color:var(--danger);font-size:13px;margin-top:8px;display:none;padding:8px 12px;background:rgba(248,113,113,0.08);border-radius:10px;border:1px solid rgba(248,113,113,0.15)}
.error-msg.show{display:block}
.switch-text{text-align:center;margin-top:20px;font-size:13px;color:var(--text3)}
.switch-text a{color:var(--accent);cursor:pointer;font-weight:600}
.success-msg{color:var(--accent);font-size:13px;margin-top:8px;display:none;padding:8px 12px;background:rgba(45,212,191,0.08);border-radius:10px;border:1px solid rgba(45,212,191,0.15)}
.success-msg.show{display:block}
.remember-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:13px;color:var(--text2)}
.remember-row input{width:16px;height:16px;accent-color:var(--accent)}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="logo-icon">HA</div>
    <div class="logo-title">Health Agent</div>
    <div class="logo-sub">Your AI healthcare navigator</div>
  </div>

  <div class="login-card">
    <div class="tab-row">
      <button class="tab active" onclick="showTab('login')">Sign In</button>
      <button class="tab" onclick="showTab('register')">Create Account</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
      <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="you@email.com" autocomplete="email"></div>
      <div class="field"><label>Password</label><input type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password"></div>
      <div class="remember-row"><input type="checkbox" id="rememberMe" checked><label for="rememberMe">Remember me</label></div>
      <button class="btn-primary" onclick="doLogin()">Sign In</button>
      <div class="divider">or</div>
      <button class="btn-bio" onclick="doBiometricLogin()">
        <span style="font-size:22px">👤</span> Sign in with Face ID / Touch ID
      </button>
      <div class="error-msg" id="loginError"></div>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" style="display:none">
      <div class="field"><label>Full Name</label><input type="text" id="regName" placeholder="J Fields" autocomplete="name"></div>
      <div class="field"><label>Email</label><input type="email" id="regEmail" placeholder="you@email.com" autocomplete="email"></div>
      <div class="field"><label>Password</label><input type="password" id="regPassword" placeholder="Choose a strong password" autocomplete="new-password"></div>
      <div class="field"><label>Confirm Password</label><input type="password" id="regConfirm" placeholder="Confirm password"></div>
      <button class="btn-primary" onclick="doRegister()">Create Account</button>
      <div class="error-msg" id="regError"></div>
      <div class="success-msg" id="regSuccess"></div>
    </div>
  </div>

  <div class="switch-text" id="switchText">
    Don't have an account? <a onclick="showTab('register')">Create one</a>
  </div>
</div>

<script>
function showTab(tab) {
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1)));
  document.getElementById('switchText').innerHTML = tab === 'login'
    ? 'Don\'t have an account? <a onclick="showTab(\'register\')">Create one</a>'
    : 'Already have an account? <a onclick="showTab(\'login\')">Sign in</a>';
  hideErrors();
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}

function hideErrors() {
  document.querySelectorAll('.error-msg,.success-msg').forEach(el => el.classList.remove('show'));
}

async function doLogin() {
  hideErrors();
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) { showError('loginError', 'Please enter email and password'); return; }

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');

    localStorage.setItem('ha_token', data.token);
    document.cookie = 'ha_token=' + data.token + ';path=/;max-age=' + (30*24*60*60) + ';SameSite=Lax';
    localStorage.setItem('ha_user', JSON.stringify(data.user));
    window.location.href = '/';
  } catch (e) {
    showError('loginError', e.message);
  }
}

async function doRegister() {
  hideErrors();
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const confirm = document.getElementById('regConfirm').value;

  if (!name || !email || !password) { showError('regError', 'All fields are required'); return; }
  if (password.length < 8) { showError('regError', 'Password must be at least 8 characters'); return; }
  if (password !== confirm) { showError('regError', 'Passwords do not match'); return; }

  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Registration failed');

    const msg = document.getElementById('regSuccess');
    msg.textContent = 'Account created! Signing you in...';
    msg.classList.add('show');

    // Auto-login
    const loginRes = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const loginData = await loginRes.json();
    if (loginRes.ok) {
      localStorage.setItem('ha_token', loginData.token);
      localStorage.setItem('ha_user', JSON.stringify(loginData.user));
      setTimeout(() => window.location.href = '/', 1000);
    } else {
      setTimeout(() => { showTab('login'); document.getElementById('loginEmail').value = email; }, 1500);
    }
  } catch (e) {
    showError('regError', e.message);
  }
}

async function doBiometricLogin() {
  hideErrors();
  if (!window.PublicKeyCredential) {
    showError('loginError', 'Biometric login is not supported on this browser. Use password instead.');
    return;
  }

  try {
    // Check if biometric is available
    const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    if (!available) {
      showError('loginError', 'Face ID / Touch ID not available on this device. Use password instead.');
      return;
    }

    // Get challenge from server
    const challengeRes = await fetch('/api/auth/biometric-challenge');
    const challengeData = await challengeRes.json();

    // Request biometric auth
    const credential = await navigator.credentials.get({
      publicKey: {
        challenge: Uint8Array.from(atob(challengeData.challenge), c => c.charCodeAt(0)),
        rpId: window.location.hostname,
        userVerification: 'required',
        timeout: 60000,
        allowCredentials: challengeData.allowCredentials ? challengeData.allowCredentials.map(c => ({
          id: Uint8Array.from(atob(c.id), ch => ch.charCodeAt(0)),
          type: 'public-key'
        })) : []
      }
    });

    // Send to server
    const credentialId = btoa(String.fromCharCode(...new Uint8Array(credential.rawId)));
    const res = await fetch('/api/auth/biometric-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ credentialId })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Biometric login failed');

    localStorage.setItem('ha_token', data.token);
    document.cookie = 'ha_token=' + data.token + ';path=/;max-age=' + (30*24*60*60) + ';SameSite=Lax';
    localStorage.setItem('ha_user', JSON.stringify(data.user));
    window.location.href = '/';
  } catch (e) {
    if (e.name === 'NotAllowedError') {
      showError('loginError', 'Biometric authentication was cancelled. Try again or use your password.');
    } else {
      showError('loginError', e.message || 'Biometric login failed. Use password instead.');
    }
  }
}

// Auto-redirect if already logged in
if (localStorage.getItem('ha_token')) {
  fetch('/api/auth/verify', {
    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('ha_token') }
  }).then(r => { if (r.ok) window.location.href = '/'; });
}

// Enter key to submit
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('loginForm').style.display !== 'none') doLogin();
    else doRegister();
  }
});
</script>
</body>
</html>
