<!DOCTYPE html>
<html>
<head>
  <title>Medical Timeline</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body{
      font-family:Arial, sans-serif;
      background:#0e1426;
      color:white;
      margin:0;
      padding:30px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:24px;
      gap:12px;
      flex-wrap:wrap;
    }
    .back{
      color:white;
      text-decoration:none;
      background:#182040;
      padding:10px 14px;
      border-radius:10px;
    }
    .item{
      background:#182040;
      margin-bottom:12px;
      padding:14px;
      border-radius:10px;
    }
    .date{
      font-weight:bold;
      color:#9fc1ff;
      margin-bottom:6px;
    }
    .meta{
      font-size:12px;
      opacity:.8;
      margin-top:8px;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>Medical Timeline</h1>
    <a class="back" href="/">← Back to Dashboard</a>
  </div>

  <div id="timeline">Loading timeline...</div>

  <script>
    function escapeHtml(str){
      if(!str) return '';
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    async function loadTimeline(){
      try{
        const res = await fetch('/api/timeline');
        const data = await res.json();

        const el = document.getElementById('timeline');

        if(!data.events || !data.events.length){
          el.innerHTML = "No timeline events yet";
          return;
        }

        el.innerHTML = data.events.map(e => `
          <div class="item">
            <div class="date">${escapeHtml(e.date || '')}</div>
            <h3>${escapeHtml(e.title || 'Medical Event')}</h3>
            <p>${escapeHtml(e.summary || '')}</p>
            <div class="meta">
              ${escapeHtml(e.type || 'event')}
              ${e.source ? ' • Source: ' + escapeHtml(e.source) : ''}
            </div>
          </div>
        `).join("");
      } catch (err) {
        document.getElementById('timeline').innerHTML = 'Error loading timeline';
      }
    }

    loadTimeline();
  </script>

</body>
</html>
