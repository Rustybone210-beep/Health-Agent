<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0f1a">
<title>Health Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',system-ui,sans-serif;background:linear-gradient(165deg,#0a0f1a 0%,#0f172a 50%,#0a0f1a 100%);min-height:100vh;color:#f1f5f9;-webkit-font-smoothing:antialiased}
.page{max-width:640px;margin:0 auto;padding:calc(env(safe-area-inset-top,20px) + 20px) 16px calc(env(safe-area-inset-bottom,20px) + 20px)}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.topbar h1{font-size:24px;font-weight:800;letter-spacing:-0.5px}
.topbar h1 span{color:#2dd4bf}
.back{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:100px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:#94a3b8;font-size:13px;font-weight:600;text-decoration:none;transition:all 0.2s}
.back:hover{background:rgba(255,255,255,0.08);color:#f1f5f9}
.empty{text-align:center;padding:48px 20px;color:#475569;font-size:14px}
.tl-item{display:flex;gap:14px;margin-bottom:4px}
.tl-line{display:flex;flex-direction:column;align-items:center;width:20px;flex-shrink:0}
.tl-dot{width:10px;height:10px;border-radius:50%;background:#14b8a6;flex-shrink:0;margin-top:8px;box-shadow:0 0 8px rgba(20,184,166,0.3)}
.tl-stem{flex:1;width:2px;background:rgba(255,255,255,0.06);margin-top:4px}
.tl-item:last-child .tl-stem{display:none}
.tl-card{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:14px 16px;margin-bottom:8px}
.tl-date{font-size:11px;font-weight:600;color:#14b8a6;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.tl-title{font-size:15px;font-weight:600;margin-bottom:4px}
.tl-title i{color:#14b8a6;margin-right:6px;font-size:13px}
.tl-summary{font-size:13px;color:#94a3b8;line-height:1.5}
.tl-meta{font-size:11px;color:#475569;margin-top:8px}
.tl-type{display:inline-block;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:600;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);margin-right:6px}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <h1>Medical <span>Timeline</span></h1>
    <a class="back" href="/"><i class="fa-solid fa-arrow-left"></i> Back</a>
  </div>
  <div id="timeline"><div class="empty">Loading...</div></div>
</div>
<script>
const icons={document:'fa-file-medical',appointment:'fa-calendar-check',medication:'fa-pills',lab:'fa-flask',insurance:'fa-shield-halved',call:'fa-phone',email:'fa-envelope'};
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
async function load(){
  const token=localStorage.getItem('ha_token');
  try{
    const res=await fetch('/api/timeline',{headers:token?{'Authorization':'Bearer '+token}:{}});
    const data=await res.json();
    const el=document.getElementById('timeline');
    if(!data.events?.length){el.innerHTML='<div class="empty">No timeline events yet. Upload documents or chat to build your medical timeline.</div>';return}
    el.innerHTML=data.events.map(e=>`<div class="tl-item"><div class="tl-line"><div class="tl-dot"></div><div class="tl-stem"></div></div><div class="tl-card"><div class="tl-date">${esc(e.date||'')}</div><div class="tl-title"><i class="fa-solid ${icons[e.type]||'fa-circle-dot'}"></i>${esc(e.title||'Event')}</div>${e.summary?`<div class="tl-summary">${esc(e.summary)}</div>`:''}<div class="tl-meta"><span class="tl-type">${esc(e.type||'event')}</span>${e.source?esc(e.source):''}</div></div></div>`).join('');
  }catch(e){document.getElementById('timeline').innerHTML='<div class="empty">Error loading timeline</div>'}
}
load();
</script>
</body>
</html>
