<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Reset Password — Health Agent</title>
<meta name="theme-color" content="#0f172a">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--bg2:#1e293b;--glass:rgba(15,23,42,0.88);--glass-border:rgba(45,212,191,0.12);--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--accent:#2dd4bf;--danger:#f87171;--sans:'Inter',-apple-system,sans-serif}
html,body{min-height:100dvh;font-family:var(--sans);background:linear-gradient(160deg,var(--bg),var(--bg2));color:var(--text);display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.wrap{width:100%;max-width:420px;padding:20px}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,#2dd4bf,#06b6d4);display:inline-flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#0f172a;margin-bottom:12px}
.logo h1{font-size:24px;font-weight:700}
.card{background:var(--glass);border:1px solid var(--glass-border);border-radius:24px;padding:28px 24px;backdrop-filter:blur(20px)}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3);margin-bottom:6px}
.field input{width:100%;background:rgba(51,65,85,0.4);border:1px solid var(--glass-border);border-radius:14px;padding:14px 16px;font-size:16px;color:var(--text);outline:none;font-family:var(--sans)}
.field input:focus{border-color:var(--accent)}
.btn{width:100%;padding:16px;border-radius:14px;border:none;background:linear-gradient(135deg,#2dd4bf,#06b6d4);color:#0f172a;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--sans)}
.btn:active{transform:scale(0.98)}
.error{color:var(--danger);font-size:13px;margin-top:12px;display:none;padding:8px 12px;background:rgba(248,113,113,0.08);border-radius:10px}
.error.show{display:block}
.success{color:var(--accent);font-size:13px;margin-top:12px;display:none;padding:8px 12px;background:rgba(45,212,191,0.08);border-radius:10px}
.success.show{display:block}
.link{text-align:center;margin-top:20px;font-size:13px;color:var(--text3)}
.link a{color:var(--accent);text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><div class="logo-icon">HA</div><h1>Reset Password</h1></div>
  <div class="card">
    <div class="field"><label>New Password</label><input type="password" id="pw1" placeholder="At least 8 characters"></div>
    <div class="field"><label>Confirm Password</label><input type="password" id="pw2" placeholder="Confirm new password"></div>
    <button class="btn" onclick="doReset()">Reset Password</button>
    <div class="error" id="err"></div>
    <div class="success" id="ok"></div>
  </div>
  <div class="link"><a href="/login">Back to Sign In</a></div>
</div>
<script>
async function doReset() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  document.getElementById('err').classList.remove('show');
  document.getElementById('ok').classList.remove('show');
  if (!pw1 || pw1.length < 8) { document.getElementById('err').textContent = 'Password must be at least 8 characters'; document.getElementById('err').classList.add('show'); return; }
  if (pw1 !== pw2) { document.getElementById('err').textContent = 'Passwords do not match'; document.getElementById('err').classList.add('show'); return; }
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if (!token) { document.getElementById('err').textContent = 'Invalid reset link. Request a new one.'; document.getElementById('err').classList.add('show'); return; }
  try {
    const res = await fetch('/api/auth/reset-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, password: pw1 }) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    document.getElementById('ok').textContent = 'Password reset! Redirecting to login...';
    document.getElementById('ok').classList.add('show');
    setTimeout(() => window.location.href = '/login', 2000);
  } catch (e) {
    document.getElementById('err').textContent = e.message;
    document.getElementById('err').classList.add('show');
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
</script>
</body>
</html>
