<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0f1a">
<title>Health Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',system-ui,sans-serif;background:linear-gradient(165deg,#0a0f1a 0%,#0f172a 50%,#0a0f1a 100%);min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;color:#f1f5f9;position:relative}
.glow{position:fixed;top:-120px;left:50%;transform:translateX(-50%);width:400px;height:400px;background:radial-gradient(circle,rgba(20,184,166,0.08) 0%,transparent 70%);pointer-events:none;z-index:0}
.container{width:100%;max-width:380px;position:relative;z-index:1}
.logo{text-align:center;margin-bottom:40px}
.logo h1{font-size:36px;font-weight:800;letter-spacing:-1px;color:#f1f5f9}
.logo h1 span{color:#2dd4bf}
.title{font-size:20px;font-weight:700;color:#f1f5f9;text-align:center;margin-bottom:8px}
.subtitle{font-size:13px;color:#94a3b8;text-align:center;margin-bottom:24px}
.auth-card{background:rgba(255,255,255,0.04);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.06);border-radius:28px;padding:28px 24px;box-shadow:0 4px 24px rgba(0,0,0,0.3)}
.field-group{position:relative}
.field-group+.field-group{border-top:1px solid rgba(255,255,255,0.06)}
.field-input{width:100%;background:transparent;border:none;padding:16px 44px 16px 16px;font-size:16px;color:#f1f5f9;font-family:inherit;outline:none}
.field-input::placeholder{color:#475569}
.field-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#475569;font-size:14px;width:18px;text-align:center}
.field-input.has-icon{padding-left:44px}
.pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#475569;cursor:pointer;font-size:14px;padding:6px}
.btn{width:100%;padding:15px;border-radius:100px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;justify-content:center;gap:8px;border:none;margin-top:16px;background:linear-gradient(135deg,#0d9488,#14b8a6);color:white;box-shadow:0 4px 20px rgba(20,184,166,0.2)}
.btn:hover{box-shadow:0 8px 32px rgba(20,184,166,0.3);transform:translateY(-1px)}
.btn:active{transform:scale(0.98)}
.msg-error,.msg-success{border-radius:14px;padding:12px 16px;font-size:13px;margin-top:16px;display:none;line-height:1.4}
.msg-error{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);color:#fca5a5}
.msg-success{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.15);color:#86efac}
.msg-error.show,.msg-success.show{display:block}
.footer-links{text-align:center;margin-top:28px}
.footer-links a{font-size:13px;color:#2dd4bf;text-decoration:none;font-weight:500}
.footer-links a:hover{text-decoration:underline}
.encryption{text-align:center;margin-top:32px;font-size:11px;color:#334155}
.encryption i{margin-right:4px;font-size:10px}
</style>
</head>
<body>
<div class="glow"></div>
<div class="container">
  <div class="logo"><h1><span>Health</span>Agent</h1></div>
  <div class="title">Reset Password</div>
  <div class="subtitle">Enter your new password below.</div>
  <div class="auth-card">
    <div class="field-group">
      <i class="fa-solid fa-lock field-icon"></i>
      <input id="pw1" class="field-input has-icon" type="password" placeholder="New password (min 8 characters)" style="padding-right:44px">
      <button type="button" class="pw-toggle" onclick="togglePw('pw1',this)"><i class="fa-solid fa-eye"></i></button>
    </div>
    <div class="field-group">
      <i class="fa-solid fa-lock field-icon"></i>
      <input id="pw2" class="field-input has-icon" type="password" placeholder="Confirm new password" style="padding-right:44px">
      <button type="button" class="pw-toggle" onclick="togglePw('pw2',this)"><i class="fa-solid fa-eye"></i></button>
    </div>
  </div>
  <button class="btn" onclick="doReset()">Reset Password</button>
  <div class="msg-error" id="err"></div>
  <div class="msg-success" id="ok"></div>
  <div class="footer-links"><a href="/login"><i class="fa-solid fa-arrow-left" style="margin-right:4px"></i>Back to Sign In</a></div>
  <div class="encryption"><i class="fa-solid fa-shield-halved"></i>Protected by end-to-end encryption</div>
</div>
<script>
function togglePw(id, btn) {
  const input = document.getElementById(id);
  const icon = btn.querySelector('i');
  if (input.type === 'password') { input.type = 'text'; icon.className = 'fa-solid fa-eye-slash'; }
  else { input.type = 'password'; icon.className = 'fa-solid fa-eye'; }
}
async function doReset() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  document.getElementById('err').classList.remove('show');
  document.getElementById('ok').classList.remove('show');
  if (!pw1 || pw1.length < 8) { document.getElementById('err').textContent = 'Password must be at least 8 characters'; document.getElementById('err').classList.add('show'); return; }
  if (pw1 !== pw2) { document.getElementById('err').textContent = 'Passwords do not match'; document.getElementById('err').classList.add('show'); return; }
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if (!token) { document.getElementById('err').textContent = 'Invalid reset link. Request a new one.'; document.getElementById('err').classList.add('show'); return; }
  try {
    const res = await fetch('/api/auth/reset-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, password: pw1 }) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    document.getElementById('ok').textContent = 'Password reset! Redirecting to login...';
    document.getElementById('ok').classList.add('show');
    setTimeout(() => window.location.href = '/login', 2000);
  } catch (e) { document.getElementById('err').textContent = e.message; document.getElementById('err').classList.add('show'); }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
</script>
</body>
</html>
