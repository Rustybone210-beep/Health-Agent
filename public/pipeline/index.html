<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealMatcher — Lead Pipeline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e5e5e5; min-height: 100vh; }
  a { color: #60a5fa; text-decoration: none; }
  a:hover { text-decoration: underline; }

  .header { background: #111; border-bottom: 1px solid #222; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header h1 span { color: #22c55e; }
  .header-actions { display: flex; gap: 8px; }

  .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
  .btn-primary { background: #22c55e; color: #000; }
  .btn-primary:hover { background: #16a34a; }
  .btn-secondary { background: #222; color: #e5e5e5; border: 1px solid #333; }
  .btn-secondary:hover { background: #333; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }
  .btn-danger { background: #dc2626; color: white; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; padding: 20px 24px; }
  .stat-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 16px; text-align: center; }
  .stat-number { font-size: 28px; font-weight: 800; color: #22c55e; }
  .stat-label { font-size: 11px; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

  .content { padding: 0 24px 24px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin: 20px 0 12px; }
  .section-title { font-size: 16px; font-weight: 700; }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .filter-btn { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid #333; background: #111; color: #999; transition: all 0.2s; }
  .filter-btn.active { background: #22c55e; color: #000; border-color: #22c55e; }

  .lead-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 16px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
  .lead-card:hover { border-color: #22c55e; transform: translateY(-1px); }
  .lead-card.hot { border-left: 3px solid #ef4444; }
  .lead-card.high { border-left: 3px solid #f59e0b; }
  .lead-card.medium { border-left: 3px solid #22c55e; }

  .lead-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .lead-name { font-weight: 700; font-size: 15px; }
  .lead-company { font-size: 12px; color: #888; }
  .lead-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }

  .badge { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-hot { background: #7f1d1d; color: #fca5a5; }
  .badge-high { background: #78350f; color: #fcd34d; }
  .badge-medium { background: #14532d; color: #86efac; }
  .badge-low { background: #1e1e1e; color: #888; }
  .badge-new { background: #1e3a5f; color: #93c5fd; }
  .badge-contacted { background: #3b0764; color: #d8b4fe; }
  .badge-qualified { background: #14532d; color: #86efac; }
  .badge-active { background: #422006; color: #fcd34d; }
  .badge-verified { background: #14532d; color: #86efac; }
  .badge-pending { background: #78350f; color: #fcd34d; }

  .score-bar { height: 4px; background: #222; border-radius: 2px; overflow: hidden; width: 60px; display: inline-block; vertical-align: middle; margin-left: 6px; }
  .score-fill { height: 100%; background: #22c55e; border-radius: 2px; transition: width 0.3s; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: #111; border: 1px solid #333; border-radius: 16px; padding: 24px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
  .modal h2 { font-size: 18px; margin-bottom: 16px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; font-weight: 600; }
  .form-input { width: 100%; padding: 10px 12px; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; color: #e5e5e5; font-size: 14px; }
  .form-input:focus { outline: none; border-color: #22c55e; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  select.form-input { appearance: none; }
  textarea.form-input { min-height: 80px; resize: vertical; }

  .detail-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid #222; }
  .detail-title { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .activity-item { padding: 8px 0; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
  .activity-time { font-size: 11px; color: #555; }
  .verify-link { display: inline-block; padding: 4px 10px; background: #1e3a5f; color: #93c5fd; border-radius: 6px; font-size: 11px; margin: 2px; }

  @media (max-width: 640px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .form-row { grid-template-columns: 1fr; }
    .header { padding: 12px 16px; }
    .content { padding: 0 16px 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Deal<span>Matcher</span> Pipeline</h1>
  <div class="header-actions">
    <button class="btn btn-secondary" onclick="openVerifyModal()">🔍 Verify</button>
    <button class="btn btn-primary" onclick="openAddModal()">+ Add Lead</button>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="content">
  <div class="filters" id="filters">
    <button class="filter-btn active" onclick="filterLeads('all')">All</button>
    <button class="filter-btn" onclick="filterLeads('hot')">🔥 Hot</button>
    <button class="filter-btn" onclick="filterLeads('new')">New</button>
    <button class="filter-btn" onclick="filterLeads('contacted')">Contacted</button>
    <button class="filter-btn" onclick="filterLeads('qualified')">Qualified</button>
    <button class="filter-btn" onclick="filterLeads('active')">Active</button>
  </div>

  <div id="leads-list"></div>
</div>

<!-- Add Lead Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>Add New Lead</h2>
    <form id="addLeadForm" onsubmit="addLead(event)">
      <div class="form-row">
        <div class="form-group"><label>Name *</label><input class="form-input" name="name" required></div>
        <div class="form-group"><label>Company</label><input class="form-input" name="company"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Email</label><input class="form-input" name="email" type="email"></div>
        <div class="form-group"><label>Phone</label><input class="form-input" name="phone"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Instagram</label><input class="form-input" name="instagram" placeholder="@handle"></div>
        <div class="form-group"><label>LinkedIn URL</label><input class="form-input" name="linkedin"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Source</label><select class="form-input" name="source"><option value="instagram">Instagram</option><option value="website">Website</option><option value="referral">Referral</option><option value="cold_outreach">Cold Outreach</option><option value="manual">Manual</option></select></div>
        <div class="form-group"><label>Priority</label><select class="form-input" name="priority"><option value="hot">🔥 Hot</option><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Deal Types</label><input class="form-input" name="deal_types" placeholder="real_estate, business, etc."></div>
        <div class="form-group"><label>Capital Available</label><input class="form-input" name="capital_available" placeholder="e.g., $500K-$2M"></div>
      </div>
      <div class="form-group"><label>Notes</label><textarea class="form-input" name="notes"></textarea></div>
      <div style="display:flex;gap:8px;margin-top:16px">
        <button type="submit" class="btn btn-primary" style="flex:1">Add Lead</button>
        <button type="button" class="btn btn-secondary" onclick="closeModal('addModal')">Cancel</button>
      </div>
    </form>
  </div>
</div>

<!-- Verify Modal -->
<div class="modal-overlay" id="verifyModal">
  <div class="modal">
    <h2>🔍 Quick Verify</h2>
    <div style="margin-bottom:16px">
      <div class="form-group"><label>Company Name</label><input class="form-input" id="verifyCompany" placeholder="e.g., Tru Vizions LLC"></div>
      <div class="form-group"><label>State (optional)</label><input class="form-input" id="verifyState" placeholder="e.g., TX"></div>
      <button class="btn btn-primary" onclick="verifyCompany()" style="width:100%;margin-top:8px">Search Company</button>
    </div>
    <div style="border-top:1px solid #222;padding-top:16px;margin-top:16px">
      <div class="form-group"><label>Person Name</label><input class="form-input" id="verifyPerson" placeholder="e.g., Gary Randal"></div>
      <div class="form-group"><label>Company (optional)</label><input class="form-input" id="verifyPersonCompany" placeholder="e.g., Tru Vizions LLC"></div>
      <button class="btn btn-primary" onclick="verifyLinkedIn()" style="width:100%;margin-top:8px">Search LinkedIn</button>
    </div>
    <div id="verifyResults" style="margin-top:16px"></div>
    <button class="btn btn-secondary" onclick="closeModal('verifyModal')" style="width:100%;margin-top:16px">Close</button>
  </div>
</div>

<!-- Lead Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" id="detailContent"></div>
</div>

<script>
let allLeads = [];
let currentFilter = "all";

async function loadLeads() {
  const res = await fetch("/api/leads");
  const data = await res.json();
  allLeads = data.leads;
  renderStats(data.stats);
  renderLeads(allLeads);
}

function renderStats(s) {
  document.getElementById("stats").innerHTML =
    '<div class="stat-card"><div class="stat-number">' + s.total + '</div><div class="stat-label">Total Leads</div></div>' +
    '<div class="stat-card"><div class="stat-number">' + s.hot + '</div><div class="stat-label">🔥 Hot</div></div>' +
    '<div class="stat-card"><div class="stat-number">' + s.new + '</div><div class="stat-label">New</div></div>' +
    '<div class="stat-card"><div class="stat-number">' + s.qualified + '</div><div class="stat-label">Qualified</div></div>' +
    '<div class="stat-card"><div class="stat-number">' + s.active + '</div><div class="stat-label">Active</div></div>' +
    '<div class="stat-card"><div class="stat-number">' + s.closed + '</div><div class="stat-label">Closed</div></div>' +
    '<div class="stat-card"><div class="stat-number">' + Math.round(s.avgScore) + '%</div><div class="stat-label">Avg Score</div></div>';
}

function renderLeads(leads) {
  const filtered = currentFilter === "all" ? leads :
    currentFilter === "hot" ? leads.filter(l => l.priority === "hot") :
    leads.filter(l => l.status === currentFilter);

  document.getElementById("leads-list").innerHTML = filtered.length === 0 ?
    '<div style="text-align:center;padding:40px;color:#555">No leads found</div>' :
    filtered.map(l => '<div class="lead-card ' + l.priority + '" onclick="openDetail(' + l.id + ')">' +
      '<div class="lead-header"><div><div class="lead-name">' + l.name + '</div>' +
      (l.company ? '<div class="lead-company">' + l.company + '</div>' : '') + '</div>' +
      '<span class="badge badge-' + l.priority + '">' + l.priority + '</span></div>' +
      '<div class="lead-meta">' +
      '<span class="badge badge-' + l.status + '">' + l.status + '</span>' +
      (l.source ? '<span style="font-size:11px;color:#666">' + l.source + '</span>' : '') +
      '<span style="font-size:11px;color:#666">Score: ' + l.verification_score + '%' +
      '<span class="score-bar"><span class="score-fill" style="width:' + l.verification_score + '%"></span></span></span>' +
      '</div></div>'
    ).join("");
}

function filterLeads(filter) {
  currentFilter = filter;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  renderLeads(allLeads);
}

function openAddModal() { document.getElementById("addModal").classList.add("active"); }
function openVerifyModal() { document.getElementById("verifyModal").classList.add("active"); document.getElementById("verifyResults").innerHTML = ""; }
function closeModal(id) { document.getElementById(id).classList.remove("active"); }

async function addLead(e) {
  e.preventDefault();
  const form = new FormData(e.target);
  const data = Object.fromEntries(form);
  const res = await fetch("/api/leads", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) });
  if (res.ok) { closeModal("addModal"); e.target.reset(); loadLeads(); }
}

async function openDetail(id) {
  const res = await fetch("/api/leads/" + id);
  const data = await res.json();
  const l = data.lead;

  document.getElementById("detailContent").innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:start">' +
    '<div><h2>' + l.name + '</h2>' + (l.company ? '<div style="color:#888">' + l.company + '</div>' : '') + '</div>' +
    '<span class="badge badge-' + l.priority + '">' + l.priority + '</span></div>' +

    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px">' +
    (l.email ? '<div style="font-size:13px">📧 ' + l.email + '</div>' : '') +
    (l.phone ? '<div style="font-size:13px">📱 ' + l.phone + '</div>' : '') +
    (l.instagram ? '<div style="font-size:13px">📷 @' + l.instagram + '</div>' : '') +
    (l.linkedin ? '<div style="font-size:13px">💼 <a href="' + l.linkedin + '" target="_blank">LinkedIn</a></div>' : '') +
    '</div>' +

    '<div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">' +
    '<span class="badge badge-' + l.status + '">' + l.status + '</span>' +
    '<span style="font-size:12px;color:#888">Score: ' + l.verification_score + '%</span>' +
    (l.company_verified ? '<span class="badge badge-verified">Company ✓</span>' : '') +
    (l.linkedin_verified ? '<span class="badge badge-verified">LinkedIn ✓</span>' : '') +
    (l.pof_verified ? '<span class="badge badge-verified">POF ✓</span>' : '') +
    '</div>' +

    '<div style="display:flex;gap:6px;margin-top:16px;flex-wrap:wrap">' +
    '<select class="form-input" style="width:auto;padding:6px 10px;font-size:12px" onchange="updateLead(' + l.id + ',\'status\',this.value)">' +
    ['new','contacted','qualified','negotiating','active','closed_won','closed_lost','dead'].map(s => '<option value="' + s + '"' + (l.status === s ? ' selected' : '') + '>' + s + '</option>').join('') + '</select>' +
    '<select class="form-input" style="width:auto;padding:6px 10px;font-size:12px" onchange="updateLead(' + l.id + ',\'priority\',this.value)">' +
    ['hot','high','medium','low','cold'].map(p => '<option value="' + p + '"' + (l.priority === p ? ' selected' : '') + '>' + p + '</option>').join('') + '</select>' +
    '<button class="btn btn-sm btn-secondary" onclick="requestPOF(' + l.id + ')">Request POF</button>' +
    '</div>' +

    (l.notes ? '<div class="detail-section"><div class="detail-title">Notes</div><div style="font-size:13px;color:#ccc;white-space:pre-wrap">' + l.notes + '</div></div>' : '') +

    '<div class="detail-section"><div class="detail-title">Activity Log</div>' +
    (data.activities.length === 0 ? '<div style="font-size:13px;color:#555">No activity yet</div>' :
    data.activities.map(a => '<div class="activity-item"><strong>' + a.title + '</strong><br><span class="activity-time">' + new Date(a.created_at).toLocaleString() + '</span>' + (a.description ? '<br><span style="color:#888;font-size:12px">' + a.description + '</span>' : '') + '</div>').join('')) +
    '</div>' +

    '<div style="display:flex;gap:8px;margin-top:16px">' +
    '<button class="btn btn-secondary" style="flex:1" onclick="closeModal(\'detailModal\')">Close</button>' +
    '<button class="btn btn-danger btn-sm" onclick="if(confirm(\'Delete this lead?\')){ deleteLead(' + l.id + ') }">Delete</button>' +
    '</div>';

  document.getElementById("detailModal").classList.add("active");
}

async function updateLead(id, field, value) {
  const body = {}; body[field] = value;
  await fetch("/api/leads/" + id, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
  loadLeads();
}

async function requestPOF(id) {
  await fetch("/api/leads/" + id + "/request-pof", { method: "POST" });
  alert("POF request logged");
  openDetail(id);
}

async function deleteLead(id) {
  await fetch("/api/leads/" + id, { method: "DELETE" });
  closeModal("detailModal");
  loadLeads();
}

async function verifyCompany() {
  const company = document.getElementById("verifyCompany").value;
  const state = document.getElementById("verifyState").value;
  if (!company) return;
  const res = await fetch("/api/verify/company", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ company, state }) });
  const data = await res.json();
  const r = data.result;
  document.getElementById("verifyResults").innerHTML =
    '<div style="margin-top:12px"><div class="detail-title">Search Links for: ' + r.company_name + '</div>' +
    Object.entries(r.search_urls).map(([k,v]) => '<a href="' + v + '" target="_blank" class="verify-link">' + k.replace(/_/g, ' ') + '</a>').join('') +
    '<div style="margin-top:12px"><div class="detail-title">Checklist</div>' +
    r.checklist.map(c => '<div style="font-size:12px;padding:4px 0">⬜ ' + c.item + '</div>').join('') +
    '</div></div>';
}

async function verifyLinkedIn() {
  const name = document.getElementById("verifyPerson").value;
  const company = document.getElementById("verifyPersonCompany").value;
  if (!name) return;
  const res = await fetch("/api/verify/linkedin", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name, company }) });
  const data = await res.json();
  const r = data.result;
  document.getElementById("verifyResults").innerHTML =
    '<div style="margin-top:12px"><div class="detail-title">LinkedIn Search: ' + r.person + '</div>' +
    Object.entries(r.search_urls).filter(([k,v]) => v).map(([k,v]) => '<a href="' + v + '" target="_blank" class="verify-link">' + k.replace(/_/g, ' ') + '</a>').join('') +
    '<div style="margin-top:12px"><div class="detail-title">Verification Checklist</div>' +
    r.checklist.map(c => '<div style="font-size:12px;padding:4px 0">⬜ ' + c.item + '</div>').join('') +
    '<div style="margin-top:12px"><div class="detail-title">🚩 Red Flags to Watch</div>' +
    r.red_flags.map(f => '<div style="font-size:12px;padding:2px 0;color:#fca5a5">⚠️ ' + f + '</div>').join('') +
    '</div></div>';
}

// Load on page ready
loadLeads();
</script>
</body>
</html>
