<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Family Health Update — Health Agent</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:20px}
.container{max-width:500px;margin:0 auto}
.header{text-align:center;padding:24px 0}
.logo{font-size:24px;font-weight:800;color:#2dd4bf}
.logo span{color:#f1f5f9}
.sub{font-size:12px;color:#64748b;margin-top:4px}
.card{background:rgba(30,41,59,0.8);border:1px solid rgba(148,163,184,0.12);border-radius:16px;padding:20px;margin-bottom:16px}
.name{font-size:22px;font-weight:700;margin-bottom:4px}
.updated{font-size:11px;color:#64748b}
.section-title{font-size:10px;font-weight:700;color:#14b8a6;text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px}
.pill{display:inline-block;padding:4px 12px;border-radius:100px;font-size:12px;font-weight:600;margin:2px 4px 2px 0}
.pill-med{background:rgba(59,130,246,0.15);color:#93c5fd;border:1px solid rgba(59,130,246,0.25)}
.pill-cond{background:rgba(20,184,166,0.15);color:#5eead4;border:1px solid rgba(20,184,166,0.25)}
.pill-allergy{background:rgba(239,68,68,0.15);color:#fca5a5;border:1px solid rgba(239,68,68,0.25)}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(148,163,184,0.08);font-size:13px}
.info-label{color:#64748b}
.info-val{color:#f1f5f9;font-weight:500}
.message-box{background:rgba(20,184,166,0.08);border:1px solid rgba(20,184,166,0.2);border-radius:12px;padding:16px;font-size:14px;color:#94a3b8;line-height:1.6;margin-bottom:16px}
.footer{text-align:center;font-size:11px;color:#475569;margin-top:24px;padding-top:16px;border-top:1px solid rgba(148,163,184,0.08)}
.error{text-align:center;padding:40px;color:#ef4444}
.loading{text-align:center;padding:40px;color:#64748b}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div class="logo">Health<span>Agent</span></div>
<div class="sub">Family Health Update</div>
</div>
<div id="content"><div class="loading">Loading health update...</div></div>
<div class="footer">
Shared via Health Agent. This is a read-only view.<br>
No login required. Data is current as of the time shown above.
</div>
</div>
<script>
const token = window.location.pathname.split('/family/')[1];
if (!token) {
  document.getElementById('content').innerHTML = '<div class="error">Invalid link.</div>';
} else {
  fetch('/api/family-view/' + token)
    .then(r => r.json())
    .then(data => {
      if (data.error) { document.getElementById('content').innerHTML = '<div class="error">' + data.error + '</div>'; return; }
      const el = document.getElementById('content');
      el.innerHTML = (data.message ? '<div class="message-box">' + data.message + '</div>' : '') +
        '<div class="card">' +
        '<div class="name">' + data.name + '</div>' +
        '<div class="updated">Updated: ' + new Date(data.lastUpdated).toLocaleDateString() + '</div>' +
        '<div class="info-row"><span class="info-label">Doctor</span><span class="info-val">' + (data.primaryDoctor || '—') + '</span></div>' +
        '<div class="info-row"><span class="info-label">Clinic</span><span class="info-val">' + (data.clinic || '—') + '</span></div>' +
        '</div>' +
        '<div class="section-title">Allergies</div>' +
        '<div>' + (data.allergies.length ? data.allergies.map(a => '<span class="pill pill-allergy">' + a + '</span>').join('') : '<span style="color:#64748b;font-size:13px">None known</span>') + '</div>' +
        '<div class="section-title">Conditions</div>' +
        '<div>' + (data.conditions.length ? data.conditions.map(c => '<span class="pill pill-cond">' + c + '</span>').join('') : '<span style="color:#64748b;font-size:13px">None listed</span>') + '</div>' +
        '<div class="section-title">Medications</div>' +
        '<div>' + (data.medications.length ? data.medications.map(m => '<span class="pill pill-med">' + m.name + ' ' + (m.dose || '') + '</span>').join('') : '<span style="color:#64748b;font-size:13px">None listed</span>') + '</div>';
    })
    .catch(() => { document.getElementById('content').innerHTML = '<div class="error">Could not load health update. The link may have expired.</div>'; });
}
</script>
</body>
</html>
