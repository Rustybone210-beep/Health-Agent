<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0f1a">
<title>Health Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0f1a;--surface:rgba(255,255,255,0.04);--surface-2:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.06);--text:#f1f5f9;--text2:#94a3b8;--text3:#475569;--teal:#14b8a6;--accent:#14b8a6;--danger:#ef4444;--warn:#f59e0b;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,20px)}
html,body{min-height:100dvh;font-family:'Inter',system-ui,sans-serif;background:linear-gradient(165deg,#0a0f1a 0%,#0f172a 50%,#0a0f1a 100%);color:var(--text);-webkit-font-smoothing:antialiased}
.page{max-width:640px;margin:0 auto;padding:calc(var(--safe-top) + 20px) 16px calc(var(--safe-bot) + 20px)}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.topbar h1{font-size:24px;font-weight:800;letter-spacing:-0.5px}
.topbar h1 span{color:#2dd4bf}
.actions{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:100px;background:var(--surface);border:1px solid var(--border);color:var(--text2);font-size:13px;font-weight:600;text-decoration:none;cursor:pointer;font-family:inherit;transition:all 0.2s}
.btn:hover{background:var(--surface-2);color:var(--text)}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--accent);color:white;border:none}

/* Brief card */
.brief{background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;backdrop-filter:blur(24px)}
.brief-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px}
.brief-logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#0d9488,#14b8a6);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0}
.brief-header-text h2{font-size:20px;font-weight:700;letter-spacing:-0.5px}
.brief-header-text p{font-size:13px;color:var(--text2);margin-top:2px}
.brief-body{padding:20px}
.section{margin-bottom:20px}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-item{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:10px 12px}
.info-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:var(--text3);margin-bottom:3px}
.info-value{font-size:14px;font-weight:500}
.info-item.full{grid-column:1/-1}
.pill-row{display:flex;flex-wrap:wrap;gap:5px}
.pill{display:inline-flex;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:500}
.pill-teal{background:rgba(20,184,166,0.1);border:1px solid rgba(20,184,166,0.15);color:var(--teal)}
.pill-red{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);color:var(--danger)}
.pill-gold{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.15);color:var(--warn)}
.med-row{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:6px}
.med-name{font-size:14px;font-weight:600}
.med-detail{font-size:12px;color:var(--text2);margin-top:2px}
.tl-item{padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.tl-item:last-child{border-bottom:none}
.tl-date{font-size:11px;font-weight:600;color:var(--accent)}
.task-item{padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px;display:flex;align-items:center;gap:8px}
.task-item:last-child{border-bottom:none}
.task-pri{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pri-h{background:var(--danger)}
.pri-m{background:var(--warn)}
.pri-l{background:var(--teal)}
.brief-footer{padding:16px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);text-align:center}
.none{color:var(--text3);font-size:13px;font-style:italic}
.interaction-warn{background:rgba(255,59,48,0.04);border:1px solid rgba(255,59,48,0.12);border-radius:10px;padding:10px 12px;margin-top:8px}
.ix-title{font-size:12px;font-weight:600;color:var(--danger);margin-bottom:4px}
.ix-text{font-size:12px;color:var(--text2);line-height:1.5}

@media print{
  .topbar{display:none}
  body{background:#fff;color:#000}
  .brief{border:none;box-shadow:none}
  .brief-header{background:#f8f8f8}
  .pill-teal,.pill-red,.pill-gold{border-color:#ccc}
}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <h1>📋 Doctor Brief</h1>
    <div class="actions">
      <a class="btn" href="/">← Back</a>
      <button class="btn btn-primary" onclick="window.print()">🖨 Print</button>
    </div>
  </div>
  <div id="brief"><div style="text-align:center;padding:40px;color:var(--text3)">Loading brief...</div></div>
</div>
<script>
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
async function load(){
  try{
    const[briefRes,medsRes]=await Promise.all([fetch('/api/brief'),fetch('/api/medications')]);
    const data=await briefRes.json();
    const medsData=await medsRes.json().catch(()=>({interactions:[]}));
    const p=data.patient||{};
    const now=new Date();
    const dateStr=now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
    const interactions=medsData.interactions||[];

    document.getElementById('brief').innerHTML=`
    <div class="brief">
      <div class="brief-header">
        <div class="brief-logo">HA</div>
        <div class="brief-header-text">
          <h2>${esc(p.name||'Patient')}</h2>
          <p>Health Agent Brief — Generated ${esc(dateStr)}</p>
        </div>
      </div>
      <div class="brief-body">
        <div class="section">
          <div class="section-title">👤 Patient Information</div>
          <div class="info-grid">
            <div class="info-item"><div class="info-label">Date of Birth</div><div class="info-value">${esc(p.dob||'—')}</div></div>
            <div class="info-item"><div class="info-label">Primary Doctor</div><div class="info-value">${esc(p.primaryDoctor||'—')}</div></div>
            <div class="info-item"><div class="info-label">Clinic</div><div class="info-value">${esc(p.clinic||'—')}</div></div>
            <div class="info-item"><div class="info-label">Preferred Hospital</div><div class="info-value">${esc(p.preferredHospital||'—')}</div></div>
            <div class="info-item"><div class="info-label">Insurance</div><div class="info-value">${esc(p.insurance?.primary||'—')}${p.insurance?.secondary?' + '+esc(p.insurance.secondary):''}</div></div>
            <div class="info-item"><div class="info-label">Member ID</div><div class="info-value">${esc(p.insurance?.memberId||'—')}</div></div>
            <div class="info-item full"><div class="info-label">Address</div><div class="info-value">${esc(p.address||'—')}</div></div>
            <div class="info-item"><div class="info-label">Pharmacy</div><div class="info-value">${esc(p.pharmacy?.name||'—')}</div></div>
            <div class="info-item"><div class="info-label">Pharmacy Phone</div><div class="info-value">${esc(p.pharmacy?.phone||'—')}</div></div>
          </div>
        </div>
        <div class="section">
          <div class="section-title">🏥 Conditions</div>
          ${(p.conditions||[]).length?`<div class="pill-row">${(p.conditions||[]).map(c=>`<span class="pill pill-gold">${esc(c)}</span>`).join('')}</div>`:'<div class="none">None listed</div>'}
        </div>
        <div class="section">
          <div class="section-title">⚠️ Allergies</div>
          ${(p.allergies||[]).length?`<div class="pill-row">${(p.allergies||[]).map(a=>`<span class="pill pill-red">${esc(a)}</span>`).join('')}</div>`:'<div class="none">None listed</div>'}
        </div>
        <div class="section">
          <div class="section-title">💊 Current Medications</div>
          ${(p.medications||[]).length?(p.medications||[]).map(m=>`<div class="med-row"><div class="med-name">${esc(m.name||'')}</div><div class="med-detail">${esc(m.dose||'')} · ${esc(m.frequency||'')}</div></div>`).join(''):'<div class="none">None listed</div>'}
          ${interactions.length?interactions.map(ix=>`<div class="interaction-warn"><div class="ix-title">${ix.severity==='high'?'🔴':'🟡'} ${esc(ix.severity).toUpperCase()}: ${esc(ix.drug1)} + ${esc(ix.drug2)}</div><div class="ix-text">${esc(ix.description)}</div></div>`).join(''):''}
        </div>
        <div class="section">
          <div class="section-title">🕐 Recent Timeline</div>
          ${(data.recentTimeline||[]).length?(data.recentTimeline||[]).map(e=>`<div class="tl-item"><div class="tl-date">${esc(e.date||'')}</div><div>${esc(e.title||'')}${e.summary?' — '+esc(e.summary):''}</div></div>`).join(''):'<div class="none">No recent events</div>'}
        </div>
        <div class="section">
          <div class="section-title">✅ Open Tasks</div>
          ${(data.openTasks||[]).length?(data.openTasks||[]).map(t=>`<div class="task-item"><div class="task-pri pri-${t.priority==='high'?'h':t.priority==='low'?'l':'m'}"></div><div>${esc(t.title||'')}${t.dueDate?' — due '+esc(t.dueDate):''}</div></div>`).join(''):'<div class="none">No open tasks</div>'}
        </div>
      </div>
      <div class="brief-footer">Generated by Health Agent · ${esc(dateStr)} · This is a caregiver reference document, not a medical record.</div>
    </div>`;
  }catch(e){document.getElementById('brief').innerHTML='<div style="text-align:center;padding:40px;color:var(--text3)">Error loading brief</div>'}
}
load();
</script>
</body>
</html>
